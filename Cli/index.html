	<script>
  (async function verifyAndProceed() {
    function getFingerprint() {
      return `${navigator.userAgent}-${screen.width}-${screen.height}-${navigator.language}-${window.devicePixelRatio}`;
    }
    
    const now = Date.now();
    const lastRefresh = localStorage.getItem('lastRefresh');
    let suspicious = false;
    
    if (lastRefresh && (now - parseInt(lastRefresh, 10) < 2000)) {
      suspicious = true;
    }
    localStorage.setItem('lastRefresh', now);
    
    try {
      const response = await fetch('https://surya-verify.vercel.app/api/verify-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fingerprint: getFingerprint(),
          suspicious: suspicious
        })
      });
      
      const data = await response.json();

      if (data.suspicious === true || !data.verified) {
        window.location.href = '/404';
        return;
      }
      
      console.log('User verified. Proceeding to the site...');
    } catch (error) {
      console.error('Error verifying user');
    }
  })();
        
(async function() {
    function block() {
      window.location.href = '/policy.html';
    }

    try {
      const res = await fetch('https://surya-verify.vercel.app/api/verify-proxy', {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
      });

      if (!res.ok) return block();

      const data = await res.json();
      if (typeof data !== 'boolean') return block();

      if (data) return block();

    } catch (err) {
      console.error('Proxy check error');
      block();
    }
  })();
 </script>

<script>
(function() {
    if (localStorage.getItem('suryaLightTheme') === 'true') {
        document.body.classList.add('light-theme');
    }
})();

    <canvas id="background-canvas"></canvas>
    
    
    <div class="geometric-shapes" id="geometricShapes"></div>
    
    
    <div class="elegant-dots" id="elegantDots"></div>
    
    
    <div class="terminal-container" id="terminalContainer">
        <div class="terminal">
            <div class="header" role="toolbar" aria-label="Terminal window controls">
                <div class="header-left">
                    <span class="header-tab">
                        <span class="header-tab-icon" aria-hidden="true">
                            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 4l3 3-3 3"></path>
                                <path d="M7 11h6"></path>
                            </svg>
                        </span>
                        <span class="header-tab-title">surya@portfolio: ~</span>
                    </span>
                </div>
                <div class="header-title" aria-hidden="true">Terminal</div>
                <div class="window-controls" role="group" aria-label="Window controls">
                    <button type="button" class="window-btn minimize" id="winMin" title="Minimize" aria-label="Minimize">
                        <svg viewBox="0 0 12 12" width="12" height="12" aria-hidden="true"><path d="M2 9h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                    <button type="button" class="window-btn maximize" id="winMax" title="Maximize" aria-label="Maximize">
                        <svg viewBox="0 0 12 12" width="12" height="12" aria-hidden="true"><rect x="2.25" y="2.25" width="7.5" height="7.5" stroke="currentColor" stroke-width="1.2" fill="none" rx="0.5"/></svg>
                    </button>
                    <button type="button" class="window-btn close" id="winClose" title="Close" aria-label="Close">
                        <svg viewBox="0 0 12 12" width="12" height="12" aria-hidden="true"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                </div>
            </div>
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">surya@portfolio:~$</span>
                <input type="text" id="commandInput" autofocus autocomplete="off" spellcheck="false" autocapitalize="off" autocorrect="off">
            </div>
            <div class="status-bar" aria-hidden="true">
                <span class="status-cell"><span class="status-led"></span>connected</span>
                <span class="status-cell">bash 5.2.15</span>
                <span class="status-cell status-cell-grow" id="statusPath">~</span>
                <span class="status-cell" id="statusClock">--:--</span>
            </div>
        </div>

        <div class="vim-shell vim-hidden" id="vimShell" aria-hidden="true">
            <div class="vim-shell__chrome" aria-hidden="true">
                <div class="vim-shell__title" id="vimTitle">vim</div>
                <div class="vim-shell__mode" id="vimModeLabel">NORMAL</div>
            </div>
            <div class="vim-shell__editor">
                <pre class="vim-shell__gutter" id="vimGutter" aria-hidden="true">1</pre>
                <textarea
                    id="vimBuffer"
                    class="vim-shell__buffer"
                    spellcheck="false"
                    autocapitalize="off"
                    autocomplete="off"
                    autocorrect="off"
                ></textarea>
            </div>
            <div class="vim-shell__statusline">
                <span class="vim-mode-pill" id="vimStatusLeft">NORMAL</span>
                <span class="vim-shell__statusline-fill" aria-hidden="true"></span>
                <span class="vim-status-right" id="vimStatusRight">[No Name]</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="animation.js"></script>
    
    <script>
        function createGeometricShapes() {
            const shapesContainer = document.getElementById('geometricShapes');
            const shapes = ['square', 'diamond', 'triangle'];
            
            for (let i = 0; i < 8; i++) {
                const shape = document.createElement('div');
                shape.className = 'geometric-shape';
                
                const size = Math.random() * 30 + 10;
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.left = Math.random() * 100 + '%';
                shape.style.top = Math.random() * 100 + '%';
                shape.style.animationDuration = (Math.random() * 20 + 15) + 's';
                shape.style.animationDelay = Math.random() * 5 + 's';
                
                const shapeType = shapes[Math.floor(Math.random() * shapes.length)];
                if (shapeType === 'diamond') {
                    shape.style.transform = 'rotate(45deg)';
                } else if (shapeType === 'triangle') {
                    shape.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
                    shape.style.borderRadius = '0';
                }
                
                shapesContainer.appendChild(shape);
            }
        }
        
        function createElegantDots() {
            const dotsContainer = document.getElementById('elegantDots');
            
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'elegant-dot';
                
                const size = Math.random() * 6 + 2;
                dot.style.width = size + 'px';
                dot.style.height = size + 'px';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.animationDuration = (Math.random() * 8 + 6) + 's';
                dot.style.animationDelay = Math.random() * 3 + 's';
                
                dotsContainer.appendChild(dot);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            createGeometricShapes();
            createElegantDots();

            const cachedShapes = document.querySelectorAll('.geometric-shape');
            setInterval(() => {
                cachedShapes.forEach(shape => {
                    if (Math.random() > 0.8) {
                        const isLight = document.body.classList.contains('light-theme');
                        shape.style.boxShadow = isLight
                            ? '0 0 20px rgba(0, 0, 0, 0.2)'
                            : '0 0 20px rgba(255, 255, 255, 0.3)';
                        setTimeout(() => {
                            shape.style.boxShadow = 'none';
                        }, 1000);
                    }
                });
            }, 2000);

            // ===== Window chrome behavior (cosmetic only — no terminal logic touched) =====
            const container = document.getElementById('terminalContainer');
            const btnMin = document.getElementById('winMin');
            const btnMax = document.getElementById('winMax');
            const btnClose = document.getElementById('winClose');
            const inputEl = document.getElementById('commandInput');

            if (btnMin) btnMin.addEventListener('click', function() {
                container.classList.toggle('is-minimized');
                if (!container.classList.contains('is-minimized') && inputEl) inputEl.focus();
            });

            if (btnMax) btnMax.addEventListener('click', function() {
                container.classList.toggle('is-maximized');
                if (inputEl) inputEl.focus();
            });

            if (btnClose) btnClose.addEventListener('click', function() {
                container.classList.add('is-closing');
                setTimeout(function() {
                    var w = window.open('', '_self');
                    try { w.close(); } catch (e) {}
                    if (!w || !w.closed) window.location = '/';
                }, 280);
            });

            // Restore on header click when minimized
            const header = container.querySelector('.header');
            if (header) header.addEventListener('dblclick', function(e) {
                if (e.target.closest('.window-btn')) return;
                container.classList.toggle('is-maximized');
            });

            // Live status clock
            const clockEl = document.getElementById('statusClock');
            if (clockEl) {
                const tick = function() {
                    const d = new Date();
                    const hh = String(d.getHours()).padStart(2, '0');
                    const mm = String(d.getMinutes()).padStart(2, '0');
                    const ss = String(d.getSeconds()).padStart(2, '0');
                    clockEl.textContent = hh + ':' + mm + ':' + ss;
                };
                tick();
                setInterval(tick, 1000);
            }

            // Mirror cwd into status bar without touching command logic
            const statusPath = document.getElementById('statusPath');
            const promptEl = document.querySelector('.prompt');
            if (statusPath && promptEl) {
                const syncPath = function() {
                    const m = (promptEl.textContent || '').match(/:([^$#]+)[$#]/);
                    if (m && m[1]) statusPath.textContent = m[1].trim();
                };
                syncPath();
                const mo = new MutationObserver(syncPath);
                mo.observe(promptEl, { childList: true, characterData: true, subtree: true });
            }

            // Keep input focused when clicking anywhere on the terminal (real-terminal feel)
            const terminalEl = document.querySelector('.terminal');
            if (terminalEl && inputEl) {
                terminalEl.addEventListener('mousedown', function(e) {
                    if (container.classList.contains('vim-active')) return;
                    if (e.target.closest('.window-btn')) return;
                    if (e.target.closest('a, button, input, textarea, .html-content')) return;
                    if (e.target.closest('.vim-shell')) return;
                    if (window.getSelection && window.getSelection().toString().length) return;
                    setTimeout(function() { inputEl.focus(); }, 0);
                });
            }

            // Mirror vim title into the terminal tab title and toggle a vim-active flag
            const vimShellEl = document.getElementById('vimShell');
            const vimTitleEl = document.getElementById('vimTitle');
            const tabTitleEl = document.querySelector('.header-tab-title');
            if (vimShellEl && tabTitleEl) {
                const baseTabTitle = tabTitleEl.textContent;
                const syncTab = function() {
                    const open = !vimShellEl.classList.contains('vim-hidden');
                    container.classList.toggle('vim-active', open);
                    if (open && vimTitleEl) {
                        tabTitleEl.textContent = vimTitleEl.textContent || baseTabTitle;
                    } else {
                        tabTitleEl.textContent = baseTabTitle;
                    }
                };
                syncTab();
                new MutationObserver(syncTab).observe(vimShellEl, { attributes: true, attributeFilter: ['class'] });
                if (vimTitleEl) {
                    new MutationObserver(syncTab).observe(vimTitleEl, { childList: true, characterData: true, subtree: true });
                }
            }
        });
    </script>
