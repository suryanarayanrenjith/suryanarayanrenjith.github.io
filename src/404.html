  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --s-bg: #000;
      --s-fg: #fff;
      --s-fg-secondary: rgba(255, 255, 255, 0.78);
      --s-fg-tertiary: rgba(255, 255, 255, 0.55);
      --s-fg-dim: rgba(255, 255, 255, 0.35);
      --s-fg-faint: rgba(255, 255, 255, 0.15);
      --s-border: rgba(255, 255, 255, 0.16);
      --s-border-subtle: rgba(255, 255, 255, 0.08);
      --s-surface: rgba(255, 255, 255, 0.04);
      --s-glow: rgba(255, 255, 255, 0.45);
      --s-font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
      --s-font-sans: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --pad-y: clamp(0.75rem, 1.9vh, 1.5rem);
      --pad-x: clamp(0.9rem, 4.5vw, 4rem);
    }
    body.light-theme {
      color-scheme: light;
      --s-bg: #f6f6f6;
      --s-fg: #111;
      --s-fg-secondary: rgba(0, 0, 0, 0.72);
      --s-fg-tertiary: rgba(0, 0, 0, 0.5);
      --s-fg-dim: rgba(0, 0, 0, 0.32);
      --s-fg-faint: rgba(0, 0, 0, 0.12);
      --s-border: rgba(0, 0, 0, 0.16);
      --s-border-subtle: rgba(0, 0, 0, 0.08);
      --s-surface: rgba(0, 0, 0, 0.04);
      --s-glow: rgba(0, 0, 0, 0.32);
    }

    ::-webkit-scrollbar { display: none; }
    html { scrollbar-width: none; }

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { margin: 0; padding: 0; width: 100%; }
    body {
      height: 100vh;
      min-height: 100dvh;
      padding-top:    max(var(--pad-y), env(safe-area-inset-top));
      padding-right:  max(var(--pad-x), env(safe-area-inset-right));
      padding-bottom: max(var(--pad-y), env(safe-area-inset-bottom));
      padding-left:   max(var(--pad-x), env(safe-area-inset-left));
      font-family: var(--s-font-sans);
      font-size: clamp(0.95rem, 0.35vw + 0.85rem, 1.05rem);
      background-color: var(--s-bg);
      color: var(--s-fg);
      line-height: 1.6;
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ----- Background stack (z-indexed below the shell) ----- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -10;
      overflow: hidden;
      pointer-events: none;
    }
    #halftoneCanvas, #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #halftoneCanvas { opacity: 0.55; }
    #particleCanvas { opacity: 0.9; }

    .stars {
      position: absolute;
      inset: -40%;
      background-image:
        radial-gradient(1px 1px at 20% 30%, var(--s-fg) 0%, transparent 60%),
        radial-gradient(1.5px 1.5px at 65% 70%, rgba(255,255,255,0.85) 0%, transparent 60%),
        radial-gradient(1px 1px at 80% 25%, var(--s-fg) 0%, transparent 60%),
        radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.6) 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 60%, var(--s-fg) 0%, transparent 60%);
      background-size: 340px 340px, 250px 250px, 290px 290px, 360px 360px, 420px 420px;
      animation: starsDrift 220s linear infinite;
      opacity: 0.75;
    }
    body.light-theme .stars {
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(0,0,0,0.55) 0%, transparent 60%),
        radial-gradient(1.5px 1.5px at 65% 70%, rgba(0,0,0,0.35) 0%, transparent 60%),
        radial-gradient(1px 1px at 80% 25%, rgba(0,0,0,0.55) 0%, transparent 60%),
        radial-gradient(1px 1px at 40% 85%, rgba(0,0,0,0.3) 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 60%, rgba(0,0,0,0.55) 0%, transparent 60%);
      opacity: 0.5;
    }
    @keyframes starsDrift {
      from { transform: translate3d(0, 0, 0) rotate(0deg); }
      to   { transform: translate3d(-120px, -120px, 0) rotate(360deg); }
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, var(--s-bg) 95%);
    }

    /* ----- Glass shell ----- */
    .shell {
      position: relative;
      z-index: 1;
      width: min(1100px, 100%);
      max-height: calc(100dvh - var(--pad-y) - var(--pad-y));
      padding: clamp(1rem, 2.4vh, 2rem) clamp(1rem, 3vw, 2.5rem);
      border-radius: clamp(1.1rem, 2vw, 2rem);
      border: 1px solid var(--s-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: clamp(0.9rem, 1.8vh, 1.7rem);
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      animation: shellIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    @keyframes shellIn { to { opacity: 1; transform: translateY(0); } }
    @supports (backdrop-filter: blur(20px)) {
      .shell {
        background: rgba(8, 8, 10, 0.55);
        backdrop-filter: blur(22px) saturate(140%);
        -webkit-backdrop-filter: blur(22px) saturate(140%);
      }
      body.light-theme .shell {
        background: rgba(248, 248, 248, 0.78);
      }
    }
    /* Sweeping highlight */
    .shell::before {
      content: '';
      position: absolute;
      top: 0; left: -30%;
      width: 30%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--s-fg), transparent);
      animation: shellScan 6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      pointer-events: none;
    }
    @keyframes shellScan {
      0%   { transform: translateX(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateX(530%); opacity: 0; }
    }
    .shell-corner {
      position: absolute;
      width: 14px; height: 14px;
      border: 1px solid var(--s-fg-faint);
      pointer-events: none;
    }
    .shell-corner.tl { top: 10px; left: 10px;  border-right: none; border-bottom: none; }
    .shell-corner.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
    .shell-corner.bl { bottom: 10px; left: 10px;  border-right: none; border-top: none; }
    .shell-corner.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

    /* ----- Path display (top crumb) ----- */
    .path-display {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 auto;
      padding: 4px 12px 8px;
      border-bottom: 1px solid var(--s-border-subtle);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-family: var(--s-font-mono);
      font-size: 0.72rem;
      color: var(--s-fg-tertiary);
      position: relative;
    }
    .path-display::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--s-glow), transparent);
      animation: pathScan 3s ease-in-out infinite;
    }
    @keyframes pathScan {
      0%, 100% { transform: translateX(-100%); }
      50%      { transform: translateX(100%); }
    }
    .path-display i { font-size: 0.78rem; opacity: 0.7; }

    /* ----- Hero grid ----- */
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1rem, 2.2vh, 2rem);
      align-items: center;
    }
    .text-stack {
      display: flex;
      flex-direction: column;
      gap: clamp(0.85rem, 1.5vw, 1.6rem);
      text-align: center;
    }

    /* ----- Glitch 404 ----- */
    .glitch-wrap { display: flex; justify-content: center; position: relative; }
    .glitch {
      position: relative;
      font-family: var(--s-font-mono);
      font-size: clamp(3rem, 18vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.35rem;
      color: var(--s-fg);
      line-height: 1;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.18),
        0 0 32px rgba(255, 255, 255, 0.12);
      animation: glitchGlow 4s ease-in-out infinite;
    }
    @keyframes glitchGlow {
      0%, 100% { text-shadow: 0 0 12px rgba(255,255,255,0.18), 0 0 32px rgba(255,255,255,0.12); }
      50%      { text-shadow: 0 0 22px rgba(255,255,255,0.4),  0 0 52px rgba(255,255,255,0.25); }
    }
    body.light-theme .glitch { text-shadow: 0 0 12px rgba(0,0,0,0.12), 0 0 32px rgba(0,0,0,0.08); }
    body.light-theme .glitch { animation: none; }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.75;
    }
    .glitch::before { left: -2px; text-shadow: 2px 0 rgba(255, 255, 255, 0.6); animation: glitchA 3s infinite; }
    .glitch::after  { left:  2px; text-shadow: -2px 0 rgba(255, 255, 255, 0.6); animation: glitchB 3s infinite; }
    body.light-theme .glitch::before { text-shadow: 2px 0 rgba(0,0,0,0.55); }
    body.light-theme .glitch::after  { text-shadow: -2px 0 rgba(0,0,0,0.55); }
    @keyframes glitchA {
      0%, 100% { clip-path: inset(0); transform: translate(0); }
      20%      { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 1px); }
      40%      { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
      60%      { clip-path: inset(80% 0 10% 0); transform: translate(-1px, 2px); }
      80%      { clip-path: inset(10% 0 70% 0); transform: translate(2px, -1px); }
    }
    @keyframes glitchB {
      0%, 100% { clip-path: inset(0); transform: translate(0); }
      15%      { clip-path: inset(60% 0 20% 0); transform: translate(1px, 1px); }
      35%      { clip-path: inset(30% 0 50% 0); transform: translate(-1px, -1px); }
      55%      { clip-path: inset(10% 0 80% 0); transform: translate(2px, 2px); }
      75%      { clip-path: inset(70% 0 15% 0); transform: translate(-2px, -1px); }
    }

    /* ----- Message + highlight ----- */
    .message {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.6rem);
      font-weight: 500;
      letter-spacing: -0.5px;
      text-transform: none;
    }
    .highlight {
      position: relative;
      display: inline-block;
      background: linear-gradient(90deg, var(--s-fg), var(--s-fg-tertiary), var(--s-fg));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 100%;
      animation: shineText 3.4s linear infinite;
    }
    @keyframes shineText { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .highlight::after {
      content: '';
      position: absolute;
      left: 0; bottom: -0.3rem;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--s-glow), transparent);
      animation: highlightPulse 2.2s ease-in-out infinite;
    }
    @keyframes highlightPulse {
      0%, 100% { opacity: 0.25; transform: scaleX(0.94); }
      50%      { opacity: 1;    transform: scaleX(1.05); }
    }

    .description {
      margin: 0;
      color: var(--s-fg-secondary);
      max-width: 56ch;
      margin-inline: auto;
      font-size: 0.95rem;
    }
    .link-highlight {
      color: var(--s-fg);
      text-decoration: none;
      border-bottom: 1px solid var(--s-fg-faint);
      transition: border-color 0.25s ease, text-shadow 0.25s ease;
      padding-bottom: 1px;
    }
    .link-highlight:hover {
      border-bottom-color: var(--s-fg);
      text-shadow: 0 0 8px var(--s-glow);
    }

    /* ----- CTA buttons — same language as src/index.html .center-button ----- */
    .ctas {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border: 1px solid var(--s-border);
      border-radius: 10px;
      background: transparent;
      color: var(--s-fg);
      font-family: var(--s-font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      transition: color 0.3s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.3s cubic-bezier(0.16,1,0.3,1),
                  transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--s-fg);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      z-index: -1;
    }
    .btn:hover { color: var(--s-bg); border-color: var(--s-fg); transform: translateY(-2px); }
    .btn:hover::before { transform: translateX(0); }
    .btn:active { transform: translateY(0); }
    .btn i { font-size: 0.95rem; }
    .btn.primary { color: var(--s-bg); border-color: var(--s-fg); }
    .btn.primary::before { transform: translateX(0); }
    .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(255,255,255,0.18); }
    body.light-theme .btn.primary:hover { box-shadow: 0 12px 36px rgba(0,0,0,0.12); }

    /* =========================================================================
       ROBOT — "SR-404 Probe Unit"
       Round chassis, holographic visor, mouse-tracked LED eyes, breathing
       reactor, orbiting data tags, antenna ping, slow radar sweep.
       The visible polish lives mostly in JS: a five-state machine
       (booting → idle → tracking → engaged → startled), spring-physics
       head rotation, idle saccades, click look-at, and pupil dilation.
       Each state is also reflected on `.figure-wrap[data-bot-state="…"]`
       so CSS can decorate the HUD chip + ambient feel.
       ========================================================================= */
    .figure-wrap {
      position: relative;
      border: 1px solid var(--s-border-subtle);
      border-radius: clamp(0.9rem, 2vw, 1.6rem);
      padding: clamp(1rem, 3vw, 2.2rem);
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005));
      display: flex;
      justify-content: center;
      overflow: hidden;
      --mouse-x: 50%;
      --mouse-y: 50%;
      --pupil-scale: 1;
    }
    .figure-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), var(--s-glow) 0%, transparent 38%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .figure-wrap:hover::before { opacity: 0.45; }

    /* Hairline grid backdrop inside the figure-wrap */
    .figure-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent 0 23px, var(--s-border-subtle) 23px 24px),
        repeating-linear-gradient(90deg, transparent 0 23px, var(--s-border-subtle) 23px 24px);
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.45), transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.45), transparent 75%);
      pointer-events: none;
    }

    .robot {
      position: relative;
      width: min(360px, 70vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 14px 40px rgba(0, 0, 0, 0.6));
      z-index: 2;
      animation: robotFloat 7s ease-in-out infinite;
    }
    @keyframes robotFloat {
      0%, 100% { transform: translateY(0)    rotate(0deg); }
      25%      { transform: translateY(-6px) rotate(0.6deg); }
      50%      { transform: translateY(-12px) rotate(0deg); }
      75%      { transform: translateY(-6px) rotate(-0.6deg); }
    }

    /* The bot-core SVG group is rotated by JS to track the cursor.
       Eyes also translate slightly. */
    .robot .bot-core {
      transform-origin: 50% 50%;
      transition: transform 0.12s ease-out;
      will-change: transform;
    }
    .robot .bot-eye {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.15s ease-out;
    }

    /* ----- HUD status chip (top-left of figure-wrap) ----- */
    .bot-status {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 4;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--s-surface);
      border: 1px solid var(--s-border-subtle);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: var(--s-font-mono);
      font-size: 9px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--s-fg-tertiary);
      pointer-events: none;
      transition: color 0.25s ease, border-color 0.25s ease;
    }
    .bot-status-led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--s-fg);
      box-shadow: 0 0 6px var(--s-fg);
      animation: hudLedPulse 1.6s ease-in-out infinite;
    }
    @keyframes hudLedPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }
    [data-bot-state="booting"]  .bot-status-led { animation-duration: 0.45s; }
    [data-bot-state="idle"]     .bot-status-led { animation-duration: 2.2s; }
    [data-bot-state="tracking"] .bot-status-led { background: var(--s-fg); }
    [data-bot-state="engaged"]  .bot-status-led { background: #6fdc8c; box-shadow: 0 0 8px rgba(111, 220, 140, 0.7); animation-duration: 1s; }
    [data-bot-state="engaged"]  .bot-status      { color: var(--s-fg); border-color: var(--s-border); }
    [data-bot-state="startled"] .bot-status-led { background: #ffd56b; box-shadow: 0 0 9px rgba(255, 213, 107, 0.7); animation-duration: 0.4s; }
    [data-bot-state="startled"] .bot-status      { color: #ffd56b; border-color: rgba(255, 213, 107, 0.4); }

    /* Pupil dilation — driven by --pupil-scale (set by JS based on state). */
    .bot-pupil {
      transform-box: fill-box;
      transform-origin: center;
      transform: scale(var(--pupil-scale, 1));
      transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Boot sequence — eyes + reactor fade in. Once JS strips the `booting`
       state from the figure-wrap, normal opacity resumes via CSS transition. */
    [data-bot-state="booting"] .bot-eye      { opacity: 0; }
    [data-bot-state="booting"] .bot-reactor  { opacity: 0.25; }
    .bot-eye, .bot-reactor                   { transition: opacity 0.6s ease; }

    /* Ambient brightness shifts per state — sells the "alive" feel without
       extra animation cost. */
    .robot {
      transition: filter 0.35s ease;
    }
    [data-bot-state="engaged"]  .robot { filter: drop-shadow(0 14px 40px rgba(0,0,0,0.6)) brightness(1.08) saturate(1.05); }
    [data-bot-state="startled"] .robot { filter: drop-shadow(0 16px 44px rgba(0,0,0,0.7)) brightness(1.25) contrast(1.06); }

    /* Click flash — applied to the core for ~360 ms. Uses filter so it
       composes with the JS-set transform without clobbering it. */
    .bot-core.is-flashing { animation: botFlash 360ms ease-out; }
    @keyframes botFlash {
      0%   { filter: brightness(1); }
      28%  { filter: brightness(1.6) drop-shadow(0 0 24px rgba(255, 255, 255, 0.55)); }
      100% { filter: brightness(1); }
    }

    /* Orbiting data tags around the robot — pure CSS animation */
    .orbits {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
    }
    .orbit-tag {
      position: absolute;
      transform: translate(-50%, -50%);
      font-family: var(--s-font-mono);
      font-size: 9px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--s-fg-secondary);
      padding: 3px 8px;
      border: 1px solid var(--s-border-subtle);
      border-radius: 999px;
      background: var(--s-surface);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .orbit-1 { width: min(440px, 84vw); height: min(440px, 84vw); margin-left: calc(-1 * min(220px, 42vw)); margin-top: calc(-1 * min(220px, 42vw)); animation: orbitSpin 24s linear infinite; }
    .orbit-2 { width: min(380px, 72vw); height: min(380px, 72vw); margin-left: calc(-1 * min(190px, 36vw)); margin-top: calc(-1 * min(190px, 36vw)); animation: orbitSpin 32s linear infinite reverse; }
    .orbit > .orbit-tag.t-top    { top: 0;    left: 50%; }
    .orbit > .orbit-tag.t-right  { top: 50%;  left: 100%; }
    .orbit > .orbit-tag.t-bottom { top: 100%; left: 50%; }
    .orbit > .orbit-tag.t-left   { top: 50%;  left: 0; }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Counter-rotate the tag content so text stays upright */
    .orbit .orbit-tag { animation: orbitTagUpright 24s linear infinite; }
    .orbit-2 .orbit-tag { animation-duration: 32s; animation-direction: reverse; }
    @keyframes orbitTagUpright {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    /* ----- Responsive ----- */
    @media (min-width: 900px) {
      .hero { grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr); }
      .text-stack { text-align: left; align-items: flex-start; }
      .path-display { margin-inline: 0; }
      .ctas { justify-content: flex-start; }
      .description { margin-inline: 0; }
    }
    @media (max-width: 600px) {
      body { --pad-y: 0.65rem; --pad-x: 0.85rem; }
      .ctas { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; justify-content: center; }
      .path-display { letter-spacing: 0.16em; }
      .shell { padding: 0.9rem; }
      .orbit-tag { font-size: 8px; padding: 2px 6px; }
    }
    @media (max-height: 860px) {
      :root { --pad-y: clamp(0.55rem, 1.1vh, 0.95rem); }
      .shell { padding: clamp(0.85rem, 1.6vh, 1.35rem) clamp(0.9rem, 2.5vw, 1.8rem); gap: clamp(0.7rem, 1.4vh, 1.15rem); }
      .hero  { gap: clamp(0.8rem, 1.6vh, 1.3rem); }
      .message { font-size: clamp(1.3rem, 3vw, 2rem); }
      .description { line-height: 1.45; }
      .figure-wrap { padding: clamp(0.7rem, 1.6vh, 1.2rem); }
      .robot { width: min(280px, 46vw); }
    }
    @media (prefers-reduced-motion: reduce) {
      .glitch, .glitch::before, .glitch::after,
      .robot, .stars, .orbit, .orbit .orbit-tag, .shell::before, .path-display::after,
      .highlight::after, .highlight {
        animation: none !important;
      }
    }
  </style>
</head>
<body>

<script>
(function() {
  if (localStorage.getItem('suryaLightTheme') === 'true') {

<!-- Background stack -->

<!-- Main shell -->

<script>
  document.addEventListener('DOMContentLoaded', () => {
    initPathDisplay();
    initRandomButton();
    initRobotTracking();
    initHalftoneCanvas();
    initParticleSystem();
    initMouseGlow();
  });

  function initPathDisplay() {
    const pathEl = document.getElementById('path-text');
    if (!pathEl) return;
    const cleaned = window.location.pathname.replace(/\/$/, '');
    const display = cleaned && cleaned !== '/' ? cleaned.slice(1) : 'Home';
    pathEl.textContent = display || 'Home';
  }

  function initRandomButton() {
    const btn = document.getElementById('randomBtn');
    const pages = ['/', '/Cli', '/?section=links', '/Resume', '/Game'];
    btn?.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.assign(pages[Math.floor(Math.random() * pages.length)]);
    });
  }

  /* SR-404 behavior — state machine + spring physics.
     States: booting → idle → tracking → engaged → startled (back to prev)
       booting   first ~1.4s on load — eyes/reactor fade in.
       idle      no mouse for 3 s — head drifts to center, eyes saccade.
       tracking  cursor active anywhere on the page.
       engaged   cursor over the figure-wrap — pupils dilate, brighter glow.
       startled  user clicked — bot snaps to look at the click, flashes.
     Spring physics replaces the old constant-rate lerp so head movement has
     real momentum (velocity + damping → slight overshoot + settle). */
  function initRobotTracking() {
    const core      = document.getElementById('bot-core');
    const leftEye   = document.getElementById('leftEye');
    const rightEye  = document.getElementById('rightEye');
    const figureWrap = document.getElementById('figure-wrap');
    const statusText = figureWrap?.querySelector('.bot-status-text');
    const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (!core) return;

    // ----- Spring physics state -----
    let tRotX = 0, tRotY = 0;   // target rotation (deg)
    let cRotX = 0, cRotY = 0;   // current rotation
    let vRotX = 0, vRotY = 0;   // angular velocity
    let cEyeX = 0, cEyeY = 0;   // current eye offset (px)
    let tEyeX = 0, tEyeY = 0;   // target eye offset
    let saccX = 0, saccY = 0;   // additive saccade offset
    let cPup  = 1, tPup = 1;    // pupil scale current / target

    // ----- State machine -----
    let state = 'booting';
    let lastMouseAt = 0;
    let onWrap = false;
    let saccadeUntil = 0;
    let nextSaccadeAt = performance.now() + 1800 + Math.random() * 1800;

    const LABELS = {
      booting:  'BOOTING…',
      idle:     'STANDBY',
      tracking: 'TRACKING',
      engaged:  'LOCKED ON',
      startled: '! ANOMALY'
    };

    function setState(next) {
      if (next === state) return;
      state = next;
      if (figureWrap) figureWrap.setAttribute('data-bot-state', next);
      if (statusText) statusText.textContent = LABELS[next] || next.toUpperCase();
      // Pupil targets per state — sells "alertness".
      tPup = next === 'engaged' ? 1.25 : next === 'startled' ? 0.65 : 1;
    }

    function normalState() { return onWrap ? 'engaged' : 'tracking'; }

    // ----- Mouse tracking -----
    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      tRotY = dx * 24;
      tRotX = -dy * 18;
      tEyeX = dx * 5;
      tEyeY = dy * 4;
      lastMouseAt = performance.now();
      if (state === 'idle' || state === 'tracking' || state === 'engaged') {
        setState(normalState());
      }
    });

    figureWrap?.addEventListener('mouseenter', () => {
      onWrap = true;
      if (state === 'tracking') setState('engaged');
    });
    figureWrap?.addEventListener('mouseleave', () => {
      onWrap = false;
      if (state === 'engaged') setState('tracking');
    });

    // ----- Click reaction — bot looks at the click, then flashes -----
    document.addEventListener('click', (e) => {
      // Skip clicks on real interactive elements so the buttons still feel ours.
      if (e.target.closest('a, button, input, textarea, label')) return;
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      // Exaggerated snap-look — spring overshoots and settles.
      tRotY = dx * 32;
      tRotX = -dy * 24;
      tEyeX = dx * 6;
      tEyeY = dy * 5;
      vRotX += 1.2;  // give the spring a kick so we get a real settle wobble
      vRotY += 1.2;
      setState('startled');
      core.classList.remove('is-flashing');
      // Force reflow so the keyframe re-runs on rapid clicks
      void core.offsetWidth;
      core.classList.add('is-flashing');
      setTimeout(() => core.classList.remove('is-flashing'), 380);
      setTimeout(() => {
        if (state === 'startled') setState(normalState());
      }, 700);
    });

    // ----- Boot complete handoff -----
    setTimeout(() => {
      if (state === 'booting') setState('idle');
    }, 1300);

    // ----- Reduced-motion: just lock the visuals and exit. -----
    if (motionQuery.matches) {
      setState('idle');
      return;
    }

    // ----- Idle saccades — random eye flicks every 2-4 s. -----
    function maybeSaccade(now) {
      if (state !== 'idle') return;
      if (now >= saccadeUntil) { saccX = 0; saccY = 0; }
      if (now < nextSaccadeAt) return;
      saccX = (Math.random() - 0.5) * 18;
      saccY = (Math.random() - 0.5) * 7;
      saccadeUntil = now + 180 + Math.random() * 220;
      nextSaccadeAt = saccadeUntil + 1600 + Math.random() * 2400;
    }

    // ----- Main loop -----
    const STIFF = 0.10;   // spring constant — how hard it pulls to target
    const DAMP  = 0.78;   // damping — 1.0 would oscillate forever, <1 settles
    const EYE_LERP = 0.20;
    const PUP_LERP = 0.12;

    function tick() {
      const now = performance.now();

      // Idle handoff after 3 s of mouse silence
      if ((state === 'tracking' || state === 'engaged') && now - lastMouseAt > 3000) {
        setState('idle');
      }

      // Idle drift — head back to neutral, eyes settle (saccades override).
      if (state === 'idle') {
        tRotX *= 0.94; tRotY *= 0.94;
        tEyeX *= 0.92; tEyeY *= 0.92;
        maybeSaccade(now);
      }

      // Spring physics on head rotation
      vRotX = (vRotX + (tRotX - cRotX) * STIFF) * DAMP;
      vRotY = (vRotY + (tRotY - cRotY) * STIFF) * DAMP;
      cRotX += vRotX;
      cRotY += vRotY;

      // Eye offset (simple critically-damped lerp, additive saccade)
      cEyeX += ((tEyeX + saccX) - cEyeX) * EYE_LERP;
      cEyeY += ((tEyeY + saccY) - cEyeY) * EYE_LERP;

      // Pupil dilation
      cPup += (tPup - cPup) * PUP_LERP;

      if (leftEye)  leftEye.style.transform  = `translate(${cEyeX.toFixed(2)}px, ${cEyeY.toFixed(2)}px)`;
      if (rightEye) rightEye.style.transform = `translate(${cEyeX.toFixed(2)}px, ${cEyeY.toFixed(2)}px)`;
      core.style.transform = `perspective(900px) rotateY(${cRotY.toFixed(2)}deg) rotateX(${cRotX.toFixed(2)}deg)`;
      if (figureWrap) figureWrap.style.setProperty('--pupil-scale', cPup.toFixed(3));

      requestAnimationFrame(tick);
    }
    tick();
  }

  /* Background halftone (white-only to match the theme) */
  function initHalftoneCanvas() {
    const canvas = document.getElementById('halftoneCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    let t = 0;
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    function draw() {
      const w = canvas.width, h = canvas.height;
      const cols = Math.max(40, Math.floor(w / 28));
      const rows = Math.max(25, Math.floor(h / 28));
      const cw = w / cols, ch = h / rows;
      ctx.clearRect(0, 0, w, h);
      for (let y = 0; y <= rows; y++) {
        for (let x = 0; x <= cols; x++) {
          const dx = x / cols - 0.5;
          const dy = y / rows - 0.5;
          const d  = Math.sqrt(dx * dx + dy * dy);
          const wave  = Math.sin(d * 14 - t) * 0.5 + 0.5;
          const wave2 = Math.cos(t * 0.3 + x * 0.05) * Math.sin(t * 0.3 + y * 0.05);
          const r = Math.max(0, (wave + wave2 * 0.3) * 3.2);
          if (r > 0.5) {
            const px = x * cw + Math.sin(t * 0.3 + x * 0.03) * 3;
            const py = y * ch + Math.cos(t * 0.3 + y * 0.03) * 3;
            ctx.beginPath();
            ctx.fillStyle = `rgba(255,255,255,${0.06 + wave * 0.18})`;
            ctx.arc(px, py, r, 0, 6.2832);
            ctx.fill();
          }
        }
      }
      if (!motionQuery.matches) {
        t += 0.04;
        requestAnimationFrame(draw);
      }
    }
    draw();
  }

  /* Floating particles + connection web (white-only) */
  function initParticleSystem() {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    let particles = [];
    let mx = -1, my = -1;
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mouseleave', () => { mx = -1; my = -1; });

    class P {
      constructor() { this.reset(); this.y = Math.random() * canvas.height; }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = -10;
        this.r = Math.random() * 1.6 + 0.4;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = Math.random() * 0.8 + 0.2;
        this.o = Math.random() * 0.4 + 0.15;
      }
      update() {
        if (mx >= 0) {
          const dx = this.x - mx, dy = this.y - my;
          const d2 = dx * dx + dy * dy;
          if (d2 < 10000) {
            const f = (100 - Math.sqrt(d2)) / 100;
            this.vx += dx * f * 0.012;
            this.vy += dy * f * 0.012;
          }
        }
        this.x += this.vx; this.y += this.vy;
        this.x += Math.sin(this.y * 0.01) * 0.25;
        this.vx *= 0.99; this.vy *= 0.99;
        if (this.y > canvas.height + 10 || this.x < -10 || this.x > canvas.width + 10) this.reset();
      }
      draw() {
        ctx.globalAlpha = this.o;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, 6.2832);
        ctx.fill();
      }
    }
    for (let i = 0; i < 70; i++) particles.push(new P());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 8;
      ctx.shadowColor = 'rgba(255,255,255,0.45)';
      const n = particles.length;
      for (let i = 0; i < n; i++) { particles[i].update(); particles[i].draw(); }
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 0.45;
      for (let i = 0; i < n; i++) {
        const a = particles[i];
        for (let j = i + 1; j < n; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 6400) {
            ctx.globalAlpha = (1 - Math.sqrt(d2) / 80) * 0.18;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  }

  function initMouseGlow() {
    const fw = document.getElementById('figure-wrap');
    if (!fw) return;
    fw.addEventListener('mousemove', (e) => {
      const r = fw.getBoundingClientRect();
      fw.style.setProperty('--mouse-x', `${((e.clientX - r.left) / r.width) * 100}%`);
      fw.style.setProperty('--mouse-y', `${((e.clientY - r.top)  / r.height) * 100}%`);
    });
  }
</script>
</body>
