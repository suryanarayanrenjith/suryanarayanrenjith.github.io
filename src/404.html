<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Page Not Found</title>
  <script src="/blocker.js"></script>
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0QSEZ9VSPZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0QSEZ9VSPZ');
  </script>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png" />
  <link rel="manifest" href="/assets/favicon/site.webmanifest" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --s-bg: #000;
      --s-fg: #fff;
      --s-fg-secondary: rgba(255, 255, 255, 0.78);
      --s-fg-tertiary: rgba(255, 255, 255, 0.55);
      --s-fg-dim: rgba(255, 255, 255, 0.35);
      --s-fg-faint: rgba(255, 255, 255, 0.15);
      --s-border: rgba(255, 255, 255, 0.16);
      --s-border-subtle: rgba(255, 255, 255, 0.08);
      --s-surface: rgba(255, 255, 255, 0.04);
      --s-glow: rgba(255, 255, 255, 0.45);
      --s-font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
      --s-font-sans: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --pad-y: clamp(0.75rem, 1.9vh, 1.5rem);
      --pad-x: clamp(0.9rem, 4.5vw, 4rem);
    }
    body.light-theme {
      color-scheme: light;
      --s-bg: #f6f6f6;
      --s-fg: #111;
      --s-fg-secondary: rgba(0, 0, 0, 0.72);
      --s-fg-tertiary: rgba(0, 0, 0, 0.5);
      --s-fg-dim: rgba(0, 0, 0, 0.32);
      --s-fg-faint: rgba(0, 0, 0, 0.12);
      --s-border: rgba(0, 0, 0, 0.16);
      --s-border-subtle: rgba(0, 0, 0, 0.08);
      --s-surface: rgba(0, 0, 0, 0.04);
      --s-glow: rgba(0, 0, 0, 0.32);
    }

    ::-webkit-scrollbar { display: none; }
    html { scrollbar-width: none; }

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { margin: 0; padding: 0; width: 100%; }
    body {
      height: 100vh;
      min-height: 100dvh;
      padding-top:    max(var(--pad-y), env(safe-area-inset-top));
      padding-right:  max(var(--pad-x), env(safe-area-inset-right));
      padding-bottom: max(var(--pad-y), env(safe-area-inset-bottom));
      padding-left:   max(var(--pad-x), env(safe-area-inset-left));
      font-family: var(--s-font-sans);
      font-size: clamp(0.95rem, 0.35vw + 0.85rem, 1.05rem);
      background-color: var(--s-bg);
      color: var(--s-fg);
      line-height: 1.6;
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ----- Background stack (z-indexed below the shell) ----- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -10;
      overflow: hidden;
      pointer-events: none;
    }
    #halftoneCanvas, #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #halftoneCanvas { opacity: 0.55; }
    #particleCanvas { opacity: 0.9; }

    .stars {
      position: absolute;
      inset: -40%;
      background-image:
        radial-gradient(1px 1px at 20% 30%, var(--s-fg) 0%, transparent 60%),
        radial-gradient(1.5px 1.5px at 65% 70%, rgba(255,255,255,0.85) 0%, transparent 60%),
        radial-gradient(1px 1px at 80% 25%, var(--s-fg) 0%, transparent 60%),
        radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.6) 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 60%, var(--s-fg) 0%, transparent 60%);
      background-size: 340px 340px, 250px 250px, 290px 290px, 360px 360px, 420px 420px;
      animation: starsDrift 220s linear infinite;
      opacity: 0.75;
    }
    body.light-theme .stars {
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(0,0,0,0.55) 0%, transparent 60%),
        radial-gradient(1.5px 1.5px at 65% 70%, rgba(0,0,0,0.35) 0%, transparent 60%),
        radial-gradient(1px 1px at 80% 25%, rgba(0,0,0,0.55) 0%, transparent 60%),
        radial-gradient(1px 1px at 40% 85%, rgba(0,0,0,0.3) 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 60%, rgba(0,0,0,0.55) 0%, transparent 60%);
      opacity: 0.5;
    }
    @keyframes starsDrift {
      from { transform: translate3d(0, 0, 0) rotate(0deg); }
      to   { transform: translate3d(-120px, -120px, 0) rotate(360deg); }
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, var(--s-bg) 95%);
    }

    /* ----- Glass shell ----- */
    .shell {
      position: relative;
      z-index: 1;
      width: min(1100px, 100%);
      max-height: calc(100dvh - var(--pad-y) - var(--pad-y));
      padding: clamp(1rem, 2.4vh, 2rem) clamp(1rem, 3vw, 2.5rem);
      border-radius: clamp(1.1rem, 2vw, 2rem);
      border: 1px solid var(--s-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: clamp(0.9rem, 1.8vh, 1.7rem);
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      animation: shellIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    @keyframes shellIn { to { opacity: 1; transform: translateY(0); } }
    @supports (backdrop-filter: blur(20px)) {
      .shell {
        background: rgba(8, 8, 10, 0.55);
        backdrop-filter: blur(22px) saturate(140%);
        -webkit-backdrop-filter: blur(22px) saturate(140%);
      }
      body.light-theme .shell {
        background: rgba(248, 248, 248, 0.78);
      }
    }
    /* Sweeping highlight */
    .shell::before {
      content: '';
      position: absolute;
      top: 0; left: -30%;
      width: 30%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--s-fg), transparent);
      animation: shellScan 6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      pointer-events: none;
    }
    @keyframes shellScan {
      0%   { transform: translateX(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateX(530%); opacity: 0; }
    }
    .shell-corner {
      position: absolute;
      width: 14px; height: 14px;
      border: 1px solid var(--s-fg-faint);
      pointer-events: none;
    }
    .shell-corner.tl { top: 10px; left: 10px;  border-right: none; border-bottom: none; }
    .shell-corner.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
    .shell-corner.bl { bottom: 10px; left: 10px;  border-right: none; border-top: none; }
    .shell-corner.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

    /* ----- Path display (top crumb) ----- */
    .path-display {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 auto;
      padding: 4px 12px 8px;
      border-bottom: 1px solid var(--s-border-subtle);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-family: var(--s-font-mono);
      font-size: 0.72rem;
      color: var(--s-fg-tertiary);
      position: relative;
    }
    .path-display::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--s-glow), transparent);
      animation: pathScan 3s ease-in-out infinite;
    }
    @keyframes pathScan {
      0%, 100% { transform: translateX(-100%); }
      50%      { transform: translateX(100%); }
    }
    .path-display i { font-size: 0.78rem; opacity: 0.7; }

    /* ----- Hero grid ----- */
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1rem, 2.2vh, 2rem);
      align-items: center;
    }
    .text-stack {
      display: flex;
      flex-direction: column;
      gap: clamp(0.85rem, 1.5vw, 1.6rem);
      text-align: center;
    }

    /* ----- Glitch 404 ----- */
    .glitch-wrap { display: flex; justify-content: center; position: relative; }
    .glitch {
      position: relative;
      font-family: var(--s-font-mono);
      font-size: clamp(3rem, 18vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.35rem;
      color: var(--s-fg);
      line-height: 1;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.18),
        0 0 32px rgba(255, 255, 255, 0.12);
      animation: glitchGlow 4s ease-in-out infinite;
    }
    @keyframes glitchGlow {
      0%, 100% { text-shadow: 0 0 12px rgba(255,255,255,0.18), 0 0 32px rgba(255,255,255,0.12); }
      50%      { text-shadow: 0 0 22px rgba(255,255,255,0.4),  0 0 52px rgba(255,255,255,0.25); }
    }
    body.light-theme .glitch { text-shadow: 0 0 12px rgba(0,0,0,0.12), 0 0 32px rgba(0,0,0,0.08); }
    body.light-theme .glitch { animation: none; }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.75;
    }
    .glitch::before { left: -2px; text-shadow: 2px 0 rgba(255, 255, 255, 0.6); animation: glitchA 3s infinite; }
    .glitch::after  { left:  2px; text-shadow: -2px 0 rgba(255, 255, 255, 0.6); animation: glitchB 3s infinite; }
    body.light-theme .glitch::before { text-shadow: 2px 0 rgba(0,0,0,0.55); }
    body.light-theme .glitch::after  { text-shadow: -2px 0 rgba(0,0,0,0.55); }
    @keyframes glitchA {
      0%, 100% { clip-path: inset(0); transform: translate(0); }
      20%      { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 1px); }
      40%      { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
      60%      { clip-path: inset(80% 0 10% 0); transform: translate(-1px, 2px); }
      80%      { clip-path: inset(10% 0 70% 0); transform: translate(2px, -1px); }
    }
    @keyframes glitchB {
      0%, 100% { clip-path: inset(0); transform: translate(0); }
      15%      { clip-path: inset(60% 0 20% 0); transform: translate(1px, 1px); }
      35%      { clip-path: inset(30% 0 50% 0); transform: translate(-1px, -1px); }
      55%      { clip-path: inset(10% 0 80% 0); transform: translate(2px, 2px); }
      75%      { clip-path: inset(70% 0 15% 0); transform: translate(-2px, -1px); }
    }

    /* ----- Message + highlight ----- */
    .message {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.6rem);
      font-weight: 500;
      letter-spacing: -0.5px;
      text-transform: none;
    }
    .highlight {
      position: relative;
      display: inline-block;
      background: linear-gradient(90deg, var(--s-fg), var(--s-fg-tertiary), var(--s-fg));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 100%;
      animation: shineText 3.4s linear infinite;
    }
    @keyframes shineText { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .highlight::after {
      content: '';
      position: absolute;
      left: 0; bottom: -0.3rem;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--s-glow), transparent);
      animation: highlightPulse 2.2s ease-in-out infinite;
    }
    @keyframes highlightPulse {
      0%, 100% { opacity: 0.25; transform: scaleX(0.94); }
      50%      { opacity: 1;    transform: scaleX(1.05); }
    }

    .description {
      margin: 0;
      color: var(--s-fg-secondary);
      max-width: 56ch;
      margin-inline: auto;
      font-size: 0.95rem;
    }
    .link-highlight {
      color: var(--s-fg);
      text-decoration: none;
      border-bottom: 1px solid var(--s-fg-faint);
      transition: border-color 0.25s ease, text-shadow 0.25s ease;
      padding-bottom: 1px;
    }
    .link-highlight:hover {
      border-bottom-color: var(--s-fg);
      text-shadow: 0 0 8px var(--s-glow);
    }

    /* ----- CTA buttons — same language as src/index.html .center-button ----- */
    .ctas {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border: 1px solid var(--s-border);
      border-radius: 10px;
      background: transparent;
      color: var(--s-fg);
      font-family: var(--s-font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      transition: color 0.3s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.3s cubic-bezier(0.16,1,0.3,1),
                  transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--s-fg);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      z-index: -1;
    }
    .btn:hover { color: var(--s-bg); border-color: var(--s-fg); transform: translateY(-2px); }
    .btn:hover::before { transform: translateX(0); }
    .btn:active { transform: translateY(0); }
    .btn i { font-size: 0.95rem; }
    .btn.primary { color: var(--s-bg); border-color: var(--s-fg); }
    .btn.primary::before { transform: translateX(0); }
    .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(255,255,255,0.18); }
    body.light-theme .btn.primary:hover { box-shadow: 0 12px 36px rgba(0,0,0,0.12); }

    /* =========================================================================
       ROBOT — the centerpiece. The previous astronaut is replaced by a much
       richer, layered bot called "SR-404 Probe Unit": a hexagonal chassis
       with a holographic visor, mouse-tracked LED eyes, a pulsing antenna,
       a breathing reactor core, orbiting data tags, and a slow radar sweep.
       ========================================================================= */
    .figure-wrap {
      position: relative;
      border: 1px solid var(--s-border-subtle);
      border-radius: clamp(0.9rem, 2vw, 1.6rem);
      padding: clamp(1rem, 3vw, 2.2rem);
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005));
      display: flex;
      justify-content: center;
      overflow: hidden;
      --mouse-x: 50%;
      --mouse-y: 50%;
    }
    .figure-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), var(--s-glow) 0%, transparent 38%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .figure-wrap:hover::before { opacity: 0.45; }

    /* Hairline grid backdrop inside the figure-wrap */
    .figure-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent 0 23px, var(--s-border-subtle) 23px 24px),
        repeating-linear-gradient(90deg, transparent 0 23px, var(--s-border-subtle) 23px 24px);
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.45), transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.45), transparent 75%);
      pointer-events: none;
    }

    .robot {
      position: relative;
      width: min(360px, 70vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 14px 40px rgba(0, 0, 0, 0.6));
      z-index: 2;
      animation: robotFloat 7s ease-in-out infinite;
    }
    @keyframes robotFloat {
      0%, 100% { transform: translateY(0)    rotate(0deg); }
      25%      { transform: translateY(-6px) rotate(0.6deg); }
      50%      { transform: translateY(-12px) rotate(0deg); }
      75%      { transform: translateY(-6px) rotate(-0.6deg); }
    }

    /* The bot-core SVG group is rotated by JS to track the cursor.
       Eyes also translate slightly. */
    .robot .bot-core {
      transform-origin: 50% 50%;
      transition: transform 0.12s ease-out;
      will-change: transform;
    }
    .robot .bot-eye {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.15s ease-out;
    }

    /* Orbiting data tags around the robot — pure CSS animation */
    .orbits {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
    }
    .orbit-tag {
      position: absolute;
      transform: translate(-50%, -50%);
      font-family: var(--s-font-mono);
      font-size: 9px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--s-fg-secondary);
      padding: 3px 8px;
      border: 1px solid var(--s-border-subtle);
      border-radius: 999px;
      background: var(--s-surface);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .orbit-1 { width: min(440px, 84vw); height: min(440px, 84vw); margin-left: calc(-1 * min(220px, 42vw)); margin-top: calc(-1 * min(220px, 42vw)); animation: orbitSpin 24s linear infinite; }
    .orbit-2 { width: min(380px, 72vw); height: min(380px, 72vw); margin-left: calc(-1 * min(190px, 36vw)); margin-top: calc(-1 * min(190px, 36vw)); animation: orbitSpin 32s linear infinite reverse; }
    .orbit > .orbit-tag.t-top    { top: 0;    left: 50%; }
    .orbit > .orbit-tag.t-right  { top: 50%;  left: 100%; }
    .orbit > .orbit-tag.t-bottom { top: 100%; left: 50%; }
    .orbit > .orbit-tag.t-left   { top: 50%;  left: 0; }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Counter-rotate the tag content so text stays upright */
    .orbit .orbit-tag { animation: orbitTagUpright 24s linear infinite; }
    .orbit-2 .orbit-tag { animation-duration: 32s; animation-direction: reverse; }
    @keyframes orbitTagUpright {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    /* ----- Responsive ----- */
    @media (min-width: 900px) {
      .hero { grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr); }
      .text-stack { text-align: left; align-items: flex-start; }
      .path-display { margin-inline: 0; }
      .ctas { justify-content: flex-start; }
      .description { margin-inline: 0; }
    }
    @media (max-width: 600px) {
      body { --pad-y: 0.65rem; --pad-x: 0.85rem; }
      .ctas { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; justify-content: center; }
      .path-display { letter-spacing: 0.16em; }
      .shell { padding: 0.9rem; }
      .orbit-tag { font-size: 8px; padding: 2px 6px; }
    }
    @media (max-height: 860px) {
      :root { --pad-y: clamp(0.55rem, 1.1vh, 0.95rem); }
      .shell { padding: clamp(0.85rem, 1.6vh, 1.35rem) clamp(0.9rem, 2.5vw, 1.8rem); gap: clamp(0.7rem, 1.4vh, 1.15rem); }
      .hero  { gap: clamp(0.8rem, 1.6vh, 1.3rem); }
      .message { font-size: clamp(1.3rem, 3vw, 2rem); }
      .description { line-height: 1.45; }
      .figure-wrap { padding: clamp(0.7rem, 1.6vh, 1.2rem); }
      .robot { width: min(280px, 46vw); }
    }
    @media (prefers-reduced-motion: reduce) {
      .glitch, .glitch::before, .glitch::after,
      .robot, .stars, .orbit, .orbit .orbit-tag, .shell::before, .path-display::after,
      .highlight::after, .highlight {
        animation: none !important;
      }
    }
  </style>
</head>
<body>

<script>
(function() {
  if (localStorage.getItem('suryaLightTheme') === 'true') {
    document.body.classList.add('light-theme');
  }
})();
</script>

<!-- Background stack -->
<div class="bg" aria-hidden="true">
  <canvas id="halftoneCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>
  <div class="stars"></div>
  <div class="vignette"></div>
</div>

<!-- Main shell -->
<main class="shell">
  <span class="shell-corner tl" aria-hidden="true"></span>
  <span class="shell-corner tr" aria-hidden="true"></span>
  <span class="shell-corner bl" aria-hidden="true"></span>
  <span class="shell-corner br" aria-hidden="true"></span>

  <p class="path-display">
    <i class="fas fa-folder-open" aria-hidden="true"></i>
    <span id="path-text">Home</span>
  </p>

  <div class="hero">
    <div class="text-stack">
      <div class="glitch-wrap">
        <span class="glitch" data-text="404" aria-label="404">404</span>
      </div>
      <h1 class="message">Lost in <span class="highlight">Space</span></h1>
      <p class="description">
        The page you're looking for has drifted into the void. Try playing my
        <a href="/Game" class="link-highlight">Space game</a> while you're here.
      </p>
      <div class="ctas">
        <a href="/" class="btn primary">
          <i class="fas fa-home" aria-hidden="true"></i>
          <span>Return Home</span>
        </a>
        <a href="#" class="btn" id="randomBtn">
          <i class="fas fa-random" aria-hidden="true"></i>
          <span>Random Page</span>
        </a>
      </div>
    </div>

    <div class="figure-wrap" id="figure-wrap">
      <!-- Orbiting data tags — pure CSS, no JS needed -->
      <div class="orbits" aria-hidden="true">
        <div class="orbit orbit-1">
          <span class="orbit-tag t-top">ID&nbsp;&middot;&nbsp;SR-404</span>
          <span class="orbit-tag t-bottom">MODE&nbsp;&middot;&nbsp;PROBE</span>
        </div>
        <div class="orbit orbit-2">
          <span class="orbit-tag t-left">STATUS&nbsp;&middot;&nbsp;LOST</span>
          <span class="orbit-tag t-right">SECTOR&nbsp;&middot;&nbsp;404</span>
        </div>
      </div>

      <svg class="robot" id="robot" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="SR-404 probe robot, floating quietly">
        <defs>
          <!-- Radial gradient for the chassis -->
          <radialGradient id="chassisFill" cx="50%" cy="40%" r="65%">
            <stop offset="0%"   stop-color="#1a1a1f" stop-opacity="0.95"/>
            <stop offset="60%"  stop-color="#0a0a0c" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#000"    stop-opacity="0.85"/>
          </radialGradient>
          <!-- Visor gradient: dark glass with a brighter reflection band -->
          <linearGradient id="visorFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#0d0d10"/>
            <stop offset="35%"  stop-color="#1a1a20"/>
            <stop offset="50%"  stop-color="#2a2a32"/>
            <stop offset="100%" stop-color="#050507"/>
          </linearGradient>
          <!-- Visor highlight band that slides across -->
          <linearGradient id="visorHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
            <stop offset="50%"  stop-color="rgba(255,255,255,0.55)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <!-- Reactor core gradient -->
          <radialGradient id="coreFill" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#fff"/>
            <stop offset="40%"  stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
          <!-- Antenna orb gradient -->
          <radialGradient id="antennaOrb" cx="35%" cy="35%" r="65%">
            <stop offset="0%"   stop-color="#fff"/>
            <stop offset="70%"  stop-color="#fff" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
          <!-- Radar sweep gradient (conic-like via SVG: from white to transparent) -->
          <linearGradient id="radarSweep" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
            <stop offset="80%"  stop-color="rgba(255,255,255,0.25)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.65)"/>
          </linearGradient>
          <!-- Soft outer glow filter -->
          <filter id="botGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.2" result="b1"/>
            <feMerge>
              <feMergeNode in="b1"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- Strong glow for the LEDs -->
          <filter id="ledGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.4" result="b1"/>
            <feGaussianBlur stdDeviation="5"   result="b2"/>
            <feMerge>
              <feMergeNode in="b2"/>
              <feMergeNode in="b1"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- Clip the visor highlight to the visor shape -->
          <clipPath id="visorClip">
            <path d="M 100 140 Q 160 130 220 140 Q 224 168 220 180 Q 160 192 100 180 Q 96 168 100 140 Z"/>
          </clipPath>
          <!-- Clip the radar sweep to the chassis -->
          <clipPath id="chassisClip">
            <path d="M 160 60 L 260 100 L 270 200 L 230 268 L 90 268 L 50 200 L 60 100 Z"/>
          </clipPath>
        </defs>

        <!-- =========== Radar sweep (back layer, clipped to chassis) =========== -->
        <g clip-path="url(#chassisClip)" opacity="0.45">
          <rect x="160" y="60" width="220" height="220" fill="url(#radarSweep)" transform-origin="160 168">
            <animateTransform attributeName="transform" type="rotate"
                              from="0 160 168" to="360 160 168" dur="6s" repeatCount="indefinite"/>
          </rect>
        </g>

        <!-- =========== Antenna assembly =========== -->
        <g class="bot-antenna" filter="url(#botGlow)">
          <!-- Antenna mast -->
          <line x1="160" y1="60" x2="160" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
          <!-- Small mid-mast band -->
          <line x1="155" y1="42" x2="165" y2="42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
          <!-- Frequency rings around the orb -->
          <circle cx="160" cy="18" r="10" fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.35">
            <animate attributeName="r" values="10;18;22" dur="1.8s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.6;0.1;0" dur="1.8s" repeatCount="indefinite"/>
          </circle>
          <circle cx="160" cy="18" r="10" fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.35">
            <animate attributeName="r" values="10;18;22" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.6;0.1;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="160" cy="18" r="10" fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.35">
            <animate attributeName="r" values="10;18;22" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.6;0.1;0" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
          </circle>
          <!-- Orb halo -->
          <circle cx="160" cy="18" r="14" fill="url(#antennaOrb)" opacity="0.85"/>
          <!-- Orb core -->
          <circle cx="160" cy="18" r="5.5" fill="#fff">
            <animate attributeName="r"       values="5.5;7;5.5" dur="1.4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.7;1"   dur="1.4s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- =========== Core (head/chassis + everything that rotates with it) =========== -->
        <g class="bot-core" id="bot-core">
          <!-- Outer chassis (hexagonal) -->
          <path d="M 160 60 L 260 100 L 270 200 L 230 268 L 90 268 L 50 200 L 60 100 Z"
                fill="url(#chassisFill)" stroke="#fff" stroke-width="1.4" stroke-opacity="0.8"
                filter="url(#botGlow)"/>

          <!-- Inner chassis seam -->
          <path d="M 160 78 L 244 110 L 252 196 L 220 254 L 100 254 L 68 196 L 76 110 Z"
                fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.18"/>

          <!-- Corner rivets / mount points -->
          <g fill="#fff" opacity="0.55">
            <circle cx="60"  cy="100" r="1.6"/>
            <circle cx="260" cy="100" r="1.6"/>
            <circle cx="270" cy="200" r="1.6"/>
            <circle cx="230" cy="268" r="1.6"/>
            <circle cx="90"  cy="268" r="1.6"/>
            <circle cx="50"  cy="200" r="1.6"/>
            <circle cx="160" cy="60"  r="1.6"/>
          </g>

          <!-- Side vents (hairline stripes) -->
          <g stroke="#fff" stroke-width="0.7" stroke-opacity="0.25" stroke-linecap="round">
            <line x1="60"  y1="138" x2="76"  y2="138"/>
            <line x1="60"  y1="148" x2="76"  y2="148"/>
            <line x1="60"  y1="158" x2="76"  y2="158"/>
            <line x1="244" y1="138" x2="260" y2="138"/>
            <line x1="244" y1="148" x2="260" y2="148"/>
            <line x1="244" y1="158" x2="260" y2="158"/>
          </g>

          <!-- =========== Visor (holographic dark glass) =========== -->
          <g class="bot-visor">
            <!-- Visor body -->
            <path d="M 100 140 Q 160 130 220 140 Q 224 168 220 180 Q 160 192 100 180 Q 96 168 100 140 Z"
                  fill="url(#visorFill)" stroke="#fff" stroke-width="0.9" stroke-opacity="0.55"/>
            <!-- Inner thin highlight along the top edge -->
            <path d="M 102 142 Q 160 134 218 142" fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.45"/>

            <!-- Scanline pattern inside the visor -->
            <g clip-path="url(#visorClip)" opacity="0.18">
              <line x1="98" y1="146" x2="222" y2="146" stroke="#fff" stroke-width="0.5"/>
              <line x1="98" y1="152" x2="222" y2="152" stroke="#fff" stroke-width="0.5"/>
              <line x1="98" y1="158" x2="222" y2="158" stroke="#fff" stroke-width="0.5"/>
              <line x1="98" y1="164" x2="222" y2="164" stroke="#fff" stroke-width="0.5"/>
              <line x1="98" y1="170" x2="222" y2="170" stroke="#fff" stroke-width="0.5"/>
              <line x1="98" y1="176" x2="222" y2="176" stroke="#fff" stroke-width="0.5"/>
              <line x1="98" y1="182" x2="222" y2="182" stroke="#fff" stroke-width="0.5"/>
            </g>

            <!-- Sliding reflection highlight across the visor -->
            <g clip-path="url(#visorClip)">
              <rect x="-60" y="138" width="80" height="46" fill="url(#visorHighlight)" opacity="0.6">
                <animate attributeName="x" values="-80;260" dur="5.5s" repeatCount="indefinite"/>
              </rect>
            </g>

            <!-- =========== Eye LEDs — tracked by JS =========== -->
            <g class="bot-eye" id="leftEye">
              <circle cx="128" cy="161" r="6.5" fill="rgba(255,255,255,0.08)" stroke="#fff" stroke-width="0.9" stroke-opacity="0.45"/>
              <circle cx="128" cy="161" r="3.2" fill="#fff" filter="url(#ledGlow)">
                <!-- Blink every 5s -->
                <animate attributeName="r" values="3.2;3.2;0.2;3.2" keyTimes="0;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
              </circle>
            </g>
            <g class="bot-eye" id="rightEye">
              <circle cx="192" cy="161" r="6.5" fill="rgba(255,255,255,0.08)" stroke="#fff" stroke-width="0.9" stroke-opacity="0.45"/>
              <circle cx="192" cy="161" r="3.2" fill="#fff" filter="url(#ledGlow)">
                <animate attributeName="r" values="3.2;3.2;0.2;3.2" keyTimes="0;0.92;0.96;1" dur="5s" begin="0.08s" repeatCount="indefinite"/>
              </circle>
            </g>
          </g>

          <!-- =========== Reactor core (chest crystal) =========== -->
          <g class="bot-reactor">
            <!-- Diamond outline -->
            <path d="M 160 200 L 178 218 L 160 236 L 142 218 Z"
                  fill="rgba(255,255,255,0.04)" stroke="#fff" stroke-width="0.9" stroke-opacity="0.55"/>
            <!-- Inner glow disc -->
            <circle cx="160" cy="218" r="11" fill="url(#coreFill)" opacity="0.85">
              <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
              <animate attributeName="r"       values="8;13;8"       dur="2.8s" repeatCount="indefinite"/>
            </circle>
            <!-- Core dot -->
            <circle cx="160" cy="218" r="2.4" fill="#fff" filter="url(#ledGlow)"/>
          </g>

          <!-- =========== Data bars (rolling indicator strip) =========== -->
          <g class="bot-bars" transform="translate(108 250)">
            <rect x="0"  y="0" width="14" height="3" rx="1" fill="#fff" opacity="0.85">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
            </rect>
            <rect x="18" y="0" width="14" height="3" rx="1" fill="#fff" opacity="0.85">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.18s" repeatCount="indefinite"/>
            </rect>
            <rect x="36" y="0" width="14" height="3" rx="1" fill="#fff" opacity="0.85">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.36s" repeatCount="indefinite"/>
            </rect>
            <rect x="54" y="0" width="14" height="3" rx="1" fill="#fff" opacity="0.85">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.54s" repeatCount="indefinite"/>
            </rect>
            <rect x="72" y="0" width="14" height="3" rx="1" fill="#fff" opacity="0.85">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.72s" repeatCount="indefinite"/>
            </rect>
            <rect x="90" y="0" width="14" height="3" rx="1" fill="#fff" opacity="0.85">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.9s" repeatCount="indefinite"/>
            </rect>
          </g>
        </g>

        <!-- =========== Status pin at the bottom (rotating arc) =========== -->
        <g transform="translate(160 290)">
          <circle cx="0" cy="0" r="14" fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.25"/>
          <circle cx="0" cy="0" r="14" fill="none" stroke="#fff" stroke-width="1.4"
                  stroke-linecap="round" stroke-dasharray="22 70" transform-origin="0 0">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
          </circle>
          <text x="0" y="3" text-anchor="middle" fill="#fff" opacity="0.55"
                font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="1.4">SR-404</text>
        </g>
      </svg>
    </div>
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    initPathDisplay();
    initRandomButton();
    initRobotTracking();
    initHalftoneCanvas();
    initParticleSystem();
    initMouseGlow();
  });

  function initPathDisplay() {
    const pathEl = document.getElementById('path-text');
    if (!pathEl) return;
    const cleaned = window.location.pathname.replace(/\/$/, '');
    const display = cleaned && cleaned !== '/' ? cleaned.slice(1) : 'Home';
    pathEl.textContent = display || 'Home';
  }

  function initRandomButton() {
    const btn = document.getElementById('randomBtn');
    const pages = ['/', '/Cli', '/?section=links', '/Resume', '/Game'];
    btn?.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.assign(pages[Math.floor(Math.random() * pages.length)]);
    });
  }

  /* Robot tracking — the head/chassis rotates 3D-style toward the cursor,
     the LED eyes slide a few px in the same direction. */
  function initRobotTracking() {
    const core    = document.getElementById('bot-core');
    const leftEye = document.getElementById('leftEye');
    const rightEye = document.getElementById('rightEye');
    const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (!core || motionQuery.matches) return;

    let tX = 0, tY = 0;   // target rotation
    let cX = 0, cY = 0;   // current rotation (lerped)

    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      tY = dx * 22;
      tX = -dy * 16;
      const eyeX = dx * 4;
      const eyeY = dy * 4;
      if (leftEye)  leftEye.style.transform  = `translate(${eyeX}px, ${eyeY}px)`;
      if (rightEye) rightEye.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
    });

    function tick() {
      cX += (tX - cX) * 0.08;
      cY += (tY - cY) * 0.08;
      core.style.transform = `perspective(900px) rotateY(${cY}deg) rotateX(${cX}deg)`;
      requestAnimationFrame(tick);
    }
    tick();
  }

  /* Background halftone (white-only to match the theme) */
  function initHalftoneCanvas() {
    const canvas = document.getElementById('halftoneCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    let t = 0;
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    function draw() {
      const w = canvas.width, h = canvas.height;
      const cols = Math.max(40, Math.floor(w / 28));
      const rows = Math.max(25, Math.floor(h / 28));
      const cw = w / cols, ch = h / rows;
      ctx.clearRect(0, 0, w, h);
      for (let y = 0; y <= rows; y++) {
        for (let x = 0; x <= cols; x++) {
          const dx = x / cols - 0.5;
          const dy = y / rows - 0.5;
          const d  = Math.sqrt(dx * dx + dy * dy);
          const wave  = Math.sin(d * 14 - t) * 0.5 + 0.5;
          const wave2 = Math.cos(t * 0.3 + x * 0.05) * Math.sin(t * 0.3 + y * 0.05);
          const r = Math.max(0, (wave + wave2 * 0.3) * 3.2);
          if (r > 0.5) {
            const px = x * cw + Math.sin(t * 0.3 + x * 0.03) * 3;
            const py = y * ch + Math.cos(t * 0.3 + y * 0.03) * 3;
            ctx.beginPath();
            ctx.fillStyle = `rgba(255,255,255,${0.06 + wave * 0.18})`;
            ctx.arc(px, py, r, 0, 6.2832);
            ctx.fill();
          }
        }
      }
      if (!motionQuery.matches) {
        t += 0.04;
        requestAnimationFrame(draw);
      }
    }
    draw();
  }

  /* Floating particles + connection web (white-only) */
  function initParticleSystem() {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    let particles = [];
    let mx = -1, my = -1;
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mouseleave', () => { mx = -1; my = -1; });

    class P {
      constructor() { this.reset(); this.y = Math.random() * canvas.height; }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = -10;
        this.r = Math.random() * 1.6 + 0.4;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = Math.random() * 0.8 + 0.2;
        this.o = Math.random() * 0.4 + 0.15;
      }
      update() {
        if (mx >= 0) {
          const dx = this.x - mx, dy = this.y - my;
          const d2 = dx * dx + dy * dy;
          if (d2 < 10000) {
            const f = (100 - Math.sqrt(d2)) / 100;
            this.vx += dx * f * 0.012;
            this.vy += dy * f * 0.012;
          }
        }
        this.x += this.vx; this.y += this.vy;
        this.x += Math.sin(this.y * 0.01) * 0.25;
        this.vx *= 0.99; this.vy *= 0.99;
        if (this.y > canvas.height + 10 || this.x < -10 || this.x > canvas.width + 10) this.reset();
      }
      draw() {
        ctx.globalAlpha = this.o;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, 6.2832);
        ctx.fill();
      }
    }
    for (let i = 0; i < 70; i++) particles.push(new P());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 8;
      ctx.shadowColor = 'rgba(255,255,255,0.45)';
      const n = particles.length;
      for (let i = 0; i < n; i++) { particles[i].update(); particles[i].draw(); }
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 0.45;
      for (let i = 0; i < n; i++) {
        const a = particles[i];
        for (let j = i + 1; j < n; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 6400) {
            ctx.globalAlpha = (1 - Math.sqrt(d2) / 80) * 0.18;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  }

  function initMouseGlow() {
    const fw = document.getElementById('figure-wrap');
    if (!fw) return;
    fw.addEventListener('mousemove', (e) => {
      const r = fw.getBoundingClientRect();
      fw.style.setProperty('--mouse-x', `${((e.clientX - r.left) / r.width) * 100}%`);
      fw.style.setProperty('--mouse-y', `${((e.clientY - r.top)  / r.height) * 100}%`);
    });
  }
</script>
</body>
