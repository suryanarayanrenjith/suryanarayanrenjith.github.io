    <script>
  (async function verifyAndProceed() {
    function getFingerprint() {
      return `${navigator.userAgent}-${screen.width}-${screen.height}-${navigator.language}-${window.devicePixelRatio}`;
    }
    const now = Date.now();
    const lastRefresh = localStorage.getItem('lastRefresh');
    let suspicious = false;
    if (lastRefresh && (now - parseInt(lastRefresh, 10) < 2000)) {
      suspicious = true;
    }
    localStorage.setItem('lastRefresh', now);
    try {
      const response = await fetch('https://surya-verify.vercel.app/api/verify-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fingerprint: getFingerprint(), suspicious: suspicious })
      });
      const data = await response.json();
      if (data.suspicious === true || !data.verified) {
        window.location.href = '/404';
        return;
      }
      console.log('User verified. Proceeding to the site...');
    } catch (error) {
      console.error('Error verifying user');
    }
  })();
    </script>
    <title>Access Restricted</title>
    <style>
        :root {
            --s-bg: #000;
            --s-fg: #fff;
            --s-fg-secondary: rgba(255, 255, 255, 0.78);
            --s-fg-tertiary: rgba(255, 255, 255, 0.55);
            --s-fg-dim: rgba(255, 255, 255, 0.32);
            --s-fg-faint: rgba(255, 255, 255, 0.14);
            --s-border: rgba(255, 255, 255, 0.16);
            --s-border-subtle: rgba(255, 255, 255, 0.08);
            --s-surface: rgba(255, 255, 255, 0.04);
            --s-glow: rgba(255, 255, 255, 0.45);
            --s-warn: #ffd56b;
            --s-font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
            --s-font-sans: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body.light-theme {
            --s-bg: #f6f6f6;
            --s-fg: #111;
            --s-fg-secondary: rgba(0, 0, 0, 0.7);
            --s-fg-tertiary: rgba(0, 0, 0, 0.5);
            --s-fg-dim: rgba(0, 0, 0, 0.32);
            --s-fg-faint: rgba(0, 0, 0, 0.12);
            --s-border: rgba(0, 0, 0, 0.16);
            --s-border-subtle: rgba(0, 0, 0, 0.08);
            --s-surface: rgba(0, 0, 0, 0.04);
            --s-glow: rgba(0, 0, 0, 0.3);
            --s-warn: #b45309;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; }

        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            font-family: var(--s-font-sans);
            background: var(--s-bg);
            color: var(--s-fg);
            overflow: hidden;
            position: relative;
            display: grid;
            place-items: center;
            min-height: 100dvh;
            transition: background 0.35s ease, color 0.35s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, var(--s-fg) 0%, transparent 60%),
                radial-gradient(1px 1px at 65% 70%, rgba(255,255,255,0.7) 0%, transparent 60%),
                radial-gradient(1.5px 1.5px at 80% 25%, var(--s-fg) 0%, transparent 60%),
                radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.5) 0%, transparent 60%),
                radial-gradient(2px 2px at 15% 60%, var(--s-fg) 0%, transparent 60%);
            background-size: 320px 320px, 240px 240px, 280px 280px, 360px 360px, 400px 400px;
            animation: starDrift 220s linear infinite;
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }
        body.light-theme::before {
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(0,0,0,0.55) 0%, transparent 60%),
                radial-gradient(1px 1px at 65% 70%, rgba(0,0,0,0.35) 0%, transparent 60%),
                radial-gradient(1.5px 1.5px at 80% 25%, rgba(0,0,0,0.55) 0%, transparent 60%),
                radial-gradient(1px 1px at 40% 85%, rgba(0,0,0,0.3) 0%, transparent 60%),
                radial-gradient(2px 2px at 15% 60%, rgba(0,0,0,0.55) 0%, transparent 60%);
            opacity: 0.5;
        }
        @keyframes starDrift {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(-120px, -120px, 0); }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at center, transparent 35%, var(--s-bg) 90%),
                repeating-linear-gradient(0deg, transparent 0 39px, var(--s-border-subtle) 39px 40px),
                repeating-linear-gradient(90deg, transparent 0 39px, var(--s-border-subtle) 39px 40px);
            pointer-events: none;
            z-index: 1;
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.7) 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.7) 30%, transparent 80%);
        }

        /* =========================================================================
           SECURITY-PERIMETER BACKGROUND ANIMATION
           Three composited layers, all purely CSS:
             1. .scan-sweep   — a conic-gradient comet tail rotating slowly around
                                the viewport, like a radar antenna.
             2. .scan-ring    — concentric hairline rings emanating from the panel
                                center every couple of seconds (sonar pings).
             3. .scan-flash   — small amber "intrusion" markers that bloom briefly
                                at fixed pseudo-random positions, evoking a packet
                                inspector flagging hits along the perimeter.
           Layered above the stars/grid (z-index 0/1) and below the panel (z-index 10).
           ========================================================================= */
        .scan-field {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        /* Rotating radar sweep — conic gradient with a narrow bright trail.
           The mask softens the edges so it reads as ambient light, not a hard cone. */
        .scan-sweep {
            position: absolute;
            top: 50%; left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            background: conic-gradient(
                from 0deg,
                rgba(255, 255, 255, 0.16) 0deg,
                rgba(255, 255, 255, 0.04) 18deg,
                transparent 38deg,
                transparent 360deg
            );
            mask-image: radial-gradient(circle at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 35%, transparent 65%);
            -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 35%, transparent 65%);
            animation: scanSweepRotate 14s linear infinite;
            opacity: 0.85;
        }
        body.light-theme .scan-sweep {
            background: conic-gradient(
                from 0deg,
                rgba(0, 0, 0, 0.12) 0deg,
                rgba(0, 0, 0, 0.03) 18deg,
                transparent 38deg,
                transparent 360deg
            );
            opacity: 0.7;
        }
        @keyframes scanSweepRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Corner-anchored scan rings — sonar pings emanating from each corner
           instead of the panel center, so the active motion lives in the
           negative space around the card (which is where the user can see it). */
        .scan-ring {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid var(--s-fg);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: scanRing 12s linear infinite;
        }
        .scan-ring--tl { top: 0;    left: 0;    animation-delay: 0s; }
        .scan-ring--tr { top: 0;    left: 100%; animation-delay: 3s;  border-style: dashed; }
        .scan-ring--br { top: 100%; left: 100%; animation-delay: 6s; }
        .scan-ring--bl { top: 100%; left: 0;    animation-delay: 9s;  border-width: 1.4px; }
        @keyframes scanRing {
            0%   { transform: translate(-50%, -50%) scale(0);  opacity: 0; }
            6%   { opacity: 0.42; }
            70%  { opacity: 0.12; }
            100% { transform: translate(-50%, -50%) scale(38); opacity: 0; }
        }

        /* Perimeter data flow — bright dots traveling clockwise around the screen
           edge on a single rectangular path. Four dots offset by 1/4 of the loop
           so one is always near every edge — looks like packets being routed
           around the firewall perimeter. Position + transform combine to keep
           a consistent 20-26 px inset from each edge. */
        .perimeter-flow {
            position: absolute;
            top: 22px; left: 22px;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--s-fg);
            box-shadow:
                0 0 10px var(--s-fg),
                0 0 22px rgba(255, 255, 255, 0.35);
            opacity: 0.75;
            animation: perimeterFlow 22s linear infinite;
        }
        .perimeter-flow::after {
            content: '';
            position: absolute;
            inset: -6px;
            border: 1px solid var(--s-fg);
            border-radius: 50%;
            opacity: 0.32;
        }
        body.light-theme .perimeter-flow {
            background: var(--s-fg);
            box-shadow: 0 0 10px rgba(0,0,0,0.35), 0 0 22px rgba(0,0,0,0.18);
        }
        @keyframes perimeterFlow {
            0%   { transform: translate(0, 0); }
            25%  { transform: translate(calc(100vw - 58px), 0); }
            50%  { transform: translate(calc(100vw - 58px), calc(100dvh - 58px)); }
            75%  { transform: translate(0, calc(100dvh - 58px)); }
            100% { transform: translate(0, 0); }
        }

        /* Edge axis ticks — thin marks along the top + bottom edges, faintly
           glowing in waves. Reads as a system meter band running along the
           perimeter, well clear of the card. */
        .edge-axis {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            pointer-events: none;
        }
        .edge-axis-top    { top: 12px; }
        .edge-axis-bottom { bottom: 12px; }
        .edge-axis span {
            display: inline-block;
            width: 1px;
            height: 7px;
            background: var(--s-fg);
            opacity: 0.18;
            animation: edgeTickPulse 3.6s ease-in-out infinite;
        }
        .edge-axis span:nth-child(odd)  { height: 5px; opacity: 0.10; }
        .edge-axis span:nth-child(5n)   { height: 11px; opacity: 0.4; }
        .edge-axis span:nth-child(1)    { animation-delay: -0s; }
        .edge-axis span:nth-child(2)    { animation-delay: -0.2s; }
        .edge-axis span:nth-child(3)    { animation-delay: -0.4s; }
        .edge-axis span:nth-child(4)    { animation-delay: -0.6s; }
        .edge-axis span:nth-child(5)    { animation-delay: -0.8s; }
        .edge-axis span:nth-child(6)    { animation-delay: -1.0s; }
        .edge-axis span:nth-child(7)    { animation-delay: -1.2s; }
        .edge-axis span:nth-child(8)    { animation-delay: -1.4s; }
        .edge-axis span:nth-child(9)    { animation-delay: -1.6s; }
        .edge-axis span:nth-child(10)   { animation-delay: -1.8s; }
        .edge-axis span:nth-child(11)   { animation-delay: -2.0s; }
        .edge-axis span:nth-child(12)   { animation-delay: -2.2s; }
        .edge-axis span:nth-child(13)   { animation-delay: -2.4s; }
        @keyframes edgeTickPulse {
            0%, 100% { opacity: var(--tick-min, 0.10); }
            50%      { opacity: var(--tick-max, 0.55); }
        }

        /* Intrusion-flash markers — small amber bloom dots at fixed positions
           that fire on staggered delays. Each gets its own --d and --x/--y
           via inline style. Reads as "packet flagged" hits along the perimeter. */
        .scan-flash {
            position: absolute;
            top: var(--y, 50%);
            left: var(--x, 50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--s-warn);
            box-shadow:
                0 0 10px var(--s-warn),
                0 0 22px rgba(255, 213, 107, 0.35);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.3);
            animation: scanFlash 9s ease-in-out infinite;
            animation-delay: var(--d, 0s);
        }
        .scan-flash::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 1px solid var(--s-warn);
            border-radius: 50%;
            opacity: 0;
            animation: scanFlashRing 9s ease-out infinite;
            animation-delay: var(--d, 0s);
        }
        @keyframes scanFlash {
            0%, 4%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            6%       { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
            10%      { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
            14%      { opacity: 0; }
            100%     { opacity: 0; }
        }
        @keyframes scanFlashRing {
            0%, 5%   { opacity: 0; transform: scale(0.6); }
            7%       { opacity: 0.7; transform: scale(1); }
            18%      { opacity: 0; transform: scale(3); }
            100%     { opacity: 0; transform: scale(3); }
        }

        /* Crosshair brackets at the screen corners — tiny detail that frames the
           composition and ties to the "perimeter scan" theme. */
        .scan-bracket {
            position: absolute;
            width: 22px;
            height: 22px;
            border: 1px solid var(--s-fg-faint);
            opacity: 0.6;
        }
        .scan-bracket.tl { top: 24px;    left: 24px;    border-right: none;  border-bottom: none; }
        .scan-bracket.tr { top: 24px;    right: 24px;   border-left: none;   border-bottom: none; }
        .scan-bracket.bl { bottom: 24px; left: 24px;    border-right: none;  border-top: none; }
        .scan-bracket.br { bottom: 24px; right: 24px;   border-left: none;   border-top: none; }
        @media (max-width: 480px) {
            .scan-bracket { width: 16px; height: 16px; }
            .scan-bracket.tl, .scan-bracket.tr { top: 14px; }
            .scan-bracket.bl, .scan-bracket.br { bottom: 14px; }
            .scan-bracket.tl, .scan-bracket.bl { left: 14px; }
            .scan-bracket.tr, .scan-bracket.br { right: 14px; }
        }

        .panel {
            position: relative;
            z-index: 10;
            width: min(540px, calc(100% - 32px));
            padding: 36px 36px 32px;
            border: 1px solid var(--s-border);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            overflow: hidden;
            opacity: 0;
            transform: translateY(14px);
            animation: panelIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }
        @supports (backdrop-filter: blur(20px)) {
            .panel {
                background: rgba(8, 8, 10, 0.55);
                backdrop-filter: blur(22px) saturate(140%);
                -webkit-backdrop-filter: blur(22px) saturate(140%);
            }
            body.light-theme .panel {
                background: rgba(248, 248, 248, 0.78);
            }
        }
        @keyframes panelIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: -30%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--s-fg), transparent);
            animation: panelScan 4.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
            pointer-events: none;
        }
        @keyframes panelScan {
            0%   { transform: translateX(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateX(530%); opacity: 0; }
        }

        .panel-corner {
            position: absolute;
            width: 14px;
            height: 14px;
            border: 1px solid var(--s-fg-faint);
            pointer-events: none;
        }
        .panel-corner.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .panel-corner.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .panel-corner.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .panel-corner.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--s-font-mono);
            font-size: 10.5px;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--s-fg-tertiary);
            margin-bottom: 28px;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 215, 107, 0.08);
            border: 1px solid rgba(255, 215, 107, 0.25);
            color: var(--s-warn);
        }
        body.light-theme .status-pill {
            background: rgba(180, 83, 9, 0.10);
            border-color: rgba(180, 83, 9, 0.32);
        }
        .status-led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--s-warn);
            box-shadow: 0 0 8px var(--s-warn);
            animation: ledPulse 1.6s ease-in-out infinite;
        }
        @keyframes ledPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.78); }
        }
        .status-code { color: var(--s-fg-dim); }

        .emblem {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 4px auto 26px;
            display: grid;
            place-items: center;
        }
        .emblem::before {
            content: '';
            position: absolute;
            inset: -28%;
            background: radial-gradient(circle, var(--s-fg-faint), transparent 60%);
            animation: emblemAura 4s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes emblemAura {
            0%, 100% { opacity: 0.3; transform: scale(0.92); }
            50%      { opacity: 0.8; transform: scale(1.1); }
        }
        .emblem-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid var(--s-fg);
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.15), inset 0 0 12px rgba(255, 255, 255, 0.06);
            animation: emblemBreathe 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            will-change: transform, opacity;
        }
        .emblem-ring--2 { animation-delay: -1s; border-style: dashed; }
        .emblem-ring--3 { animation-delay: -2s; }
        @keyframes emblemBreathe {
            0%, 100% { transform: scale(0.5); opacity: 0.15; }
            50%      { transform: scale(1);   opacity: 1; }
        }
        body.light-theme .emblem-ring {
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1), inset 0 0 10px rgba(0, 0, 0, 0.05);
        }
        .emblem-shield {
            position: relative;
            width: 36px;
            height: 36px;
            color: var(--s-fg);
            filter: drop-shadow(0 0 10px var(--s-glow));
        }

        .eyebrow {
            font-family: var(--s-font-mono);
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--s-fg-dim);
            margin-bottom: 8px;
            text-align: center;
        }
        h1 {
            font-family: var(--s-font-sans);
            font-size: clamp(1.6rem, 4vw, 2rem);
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--s-fg);
            margin: 0 0 12px;
            text-align: center;
        }
        .lede {
            color: var(--s-fg-secondary);
            font-size: 0.92rem;
            line-height: 1.65;
            text-align: center;
            margin: 0 auto 24px;
            max-width: 420px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border: 1px solid var(--s-border);
            border-radius: 10px;
            background: transparent;
            color: var(--s-fg);
            font-family: var(--s-font-mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            transition:
                color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--s-fg);
            transform: translateX(-101%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }
        .btn:hover { color: var(--s-bg); border-color: var(--s-fg); transform: translateY(-2px); }
        .btn:hover::before { transform: translateX(0); }
        .btn:active { transform: translateY(0); }
        .btn svg { width: 14px; height: 14px; }

        .hint {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px dashed var(--s-border-subtle);
            font-family: var(--s-font-mono);
            font-size: 10px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--s-fg-dim);
            text-align: center;
        }

        @media (max-width: 480px) {
            .panel       { padding: 28px 22px 24px; border-radius: 14px; }
            .status-row  { font-size: 9.5px; letter-spacing: 1.3px; }
            .emblem      { width: 84px; height: 84px; margin-bottom: 22px; }
            h1           { font-size: 1.45rem; }
            .lede        { font-size: 0.88rem; }
            .btn         { padding: 11px 18px; font-size: 11px; }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before, .panel::before, .status-led,
            .emblem::before, .emblem-ring,
            .scan-sweep, .scan-ring, .scan-flash, .scan-flash::after,
            .perimeter-flow, .edge-axis span { animation: none !important; }
            .emblem-ring { transform: scale(0.78); opacity: 0.6; }
            /* Park a static perimeter — corner brackets + edge ticks still
               anchor the composition without any motion. */
            .scan-ring, .scan-flash, .scan-sweep, .perimeter-flow { opacity: 0; }
            .edge-axis span { opacity: 0.18; }
        }
    </style>
</head>
<body>

<script>
(function() {
    if (localStorage.getItem('suryaLightTheme') === 'true') {
        document.body.classList.add('light-theme');
    }
})();
</script>

<!-- Security-perimeter scan background. Pure CSS — no JS, no canvas.
     All active motion lives OUTSIDE the panel:
       - sweep covers the full viewport but its center is masked
       - scan-rings emanate from the four corners outward
       - perimeter-flow dots travel clockwise around the screen edge
       - edge-axis ticks pulse along the top + bottom edges
       - scan-flash markers + corner brackets pin the framing -->
<div class="scan-field" aria-hidden="true">
    <div class="scan-sweep"></div>

    <!-- 4 corner-anchored sonar pings, staggered 3s apart on a 12s loop -->
    <div class="scan-ring scan-ring--tl"></div>
    <div class="scan-ring scan-ring--tr"></div>
    <div class="scan-ring scan-ring--br"></div>
    <div class="scan-ring scan-ring--bl"></div>

    <!-- Perimeter packet flow — 4 dots offset by 1/4 of the loop -->
    <span class="perimeter-flow"></span>
    <span class="perimeter-flow" style="animation-delay: -5.5s"></span>
    <span class="perimeter-flow" style="animation-delay: -11s"></span>
    <span class="perimeter-flow" style="animation-delay: -16.5s"></span>

    <!-- Edge tick bands along the top + bottom horizons -->
    <div class="edge-axis edge-axis-top">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="edge-axis edge-axis-bottom">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Intrusion-flash markers pushed toward the edges (not behind the card) -->
    <span class="scan-flash" style="--x: 12%; --y: 16%; --d: 0.0s;"></span>
    <span class="scan-flash" style="--x: 88%; --y: 14%; --d: 1.9s;"></span>
    <span class="scan-flash" style="--x: 92%; --y: 84%; --d: 3.4s;"></span>
    <span class="scan-flash" style="--x: 14%; --y: 86%; --d: 5.1s;"></span>
    <span class="scan-flash" style="--x: 6%;  --y: 50%; --d: 6.6s;"></span>
    <span class="scan-flash" style="--x: 94%; --y: 50%; --d: 7.8s;"></span>

    <!-- HUD corner brackets framing the whole composition -->
    <span class="scan-bracket tl"></span>
    <span class="scan-bracket tr"></span>
    <span class="scan-bracket bl"></span>
    <span class="scan-bracket br"></span>
</div>

<main class="panel" role="alertdialog" aria-labelledby="restrictedTitle">
    <span class="panel-corner tl" aria-hidden="true"></span>
    <span class="panel-corner tr" aria-hidden="true"></span>
    <span class="panel-corner bl" aria-hidden="true"></span>
    <span class="panel-corner br" aria-hidden="true"></span>

    <div class="status-row">
        <span class="status-pill"><span class="status-led" aria-hidden="true"></span>Connection&nbsp;Blocked</span>
        <span class="status-code">CODE&nbsp;X-403</span>
    </div>

    <div class="emblem" aria-hidden="true">
        <span class="emblem-ring emblem-ring--1"></span>
        <span class="emblem-ring emblem-ring--2"></span>
        <span class="emblem-ring emblem-ring--3"></span>
        <svg class="emblem-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <circle cx="12" cy="16.5" r="0.6" fill="currentColor"/>
        </svg>
    </div>

    <p class="eyebrow">Surya &middot; secure gateway</p>
    <h1 id="restrictedTitle">Access Restricted</h1>
    <p class="lede">
        Your connection has been flagged by the upstream verifier.
        Disable any active VPN or proxy and reload the page to continue.
    </p>

    <div class="actions">
        <a href="javascript:void(0)" class="btn" onclick="location.reload(); return false;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Refresh Page
        </a>
    </div>

    <p class="hint">If this persists &middot; clear VPN routes or switch network</p>
</main>

</body>
</html>
