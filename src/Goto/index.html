<script>
  (async function verifyAndProceed() {
    function getFingerprint() {
      return `${navigator.userAgent}-${screen.width}-${screen.height}-${navigator.language}-${window.devicePixelRatio}`;
    }

    const now = Date.now();
    const lastRefresh = localStorage.getItem('lastRefresh');
    let suspicious = false;

    if (lastRefresh && (now - parseInt(lastRefresh, 10) < 2000)) {
      suspicious = true;
    }
    localStorage.setItem('lastRefresh', now);

    try {
      const response = await fetch('https://surya-verify.vercel.app/api/verify-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fingerprint: getFingerprint(),
          suspicious: suspicious
        })
      });

      const data = await response.json();

      if (data.suspicious === true || !data.verified) {
        window.location.href = '/404';
        return;
      }

      console.log('User verified. Proceeding to the site...');
    } catch (error) {
      console.error('Error verifying user');
    }
  })();

(async function() {
    function block() {
      window.location.href = '/policy.html';
    }

    try {
      const res = await fetch('https://surya-verify.vercel.app/api/verify-proxy', {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
      });

      if (!res.ok) return block();

      const data = await res.json();
      if (typeof data !== 'boolean') return block();

      if (data) return block();

    } catch (err) {
      console.error('Proxy check error');
      block();
    }
  })();
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (!window.localStorage) {
        window.location.href = '/404';
        return;
    }

    if (!window.fetch) {
        window.location.href = '/404';
        return;
    }

    const bK = 'blockedUser';
    const vK = 'verifiedUser';
    const userAgent = navigator.userAgent;

    function isBotUA(uA) {
        return /curl|bot|spider|crawler|wget|Mediapartners-Google/i.test(uA);
    }

    function setBlocked() {
        localStorage.setItem(bK, 'true');
    }

    function clearBlocked() {
        localStorage.removeItem(bK);
    }

    function isBlocked() {
        return localStorage.getItem(bK) === "true";
    }

    function rateLimitCheck() {
        const attempts = JSON.parse(localStorage.getItem("attemptLog")) || [];
        const now = Date.now();
        const maxAttempts = 5;
        const timeWindow = 10000;

        const recent = attempts.filter(ts => now - ts < timeWindow);
        localStorage.setItem("attemptLog", JSON.stringify(recent));

        if (recent.length >= maxAttempts) {
            window.location.href = '/404';
            return true;
        }

        recent.push(now);
        localStorage.setItem("attemptLog", JSON.stringify(recent));
        return false;
    }

    async function redirectPath() {
        const path = window.location.pathname;
        const query = new URLSearchParams(window.location.search);
        const id = query.get('id');
        const gotoPath = '/Goto/';

        setTimeout(async () => {
            if (path.startsWith(gotoPath) && id) {
                try {
                    const response = await fetch(`https://surya-api.vercel.app/api/getLink?id=${encodeURIComponent(id)}`);
                    const data = await response.json();

                    if (data.link) {
                        window.location.href = data.link;
                    } else {
                        window.location.href = '/404';
                    }
                } catch (error) {
                    window.location.href = '/404';
                }
            } else {
                window.location.href = '/404';
            }
        }, 3000);
    }

    if (localStorage.getItem(vK)) {
        clearBlocked();
    } else {

        if (rateLimitCheck()) {
            return;
        }

        if (isBotUA(userAgent)) {
            setBlocked();
        }
    }

    if (isBlocked()) {
        window.location.href = '/404';
    } else {
        redirectPath();
    }
});
</script>
<style>
:root {
    --s-bg: #000;
    --s-fg: #fff;
    --s-fg-muted: rgba(255, 255, 255, 0.58);
    --s-fg-dim: rgba(255, 255, 255, 0.32);
    --s-fg-faint: rgba(255, 255, 255, 0.14);
    --s-border: rgba(255, 255, 255, 0.14);
    --s-track: rgba(255, 255, 255, 0.08);
    --s-font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
    --s-font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body.light-theme {
    --s-bg: #f6f6f6;
    --s-fg: #111;
    --s-fg-muted: rgba(0, 0, 0, 0.55);
    --s-fg-dim: rgba(0, 0, 0, 0.32);
    --s-fg-faint: rgba(0, 0, 0, 0.12);
    --s-border: rgba(0, 0, 0, 0.12);
    --s-track: rgba(0, 0, 0, 0.06);
}

*, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

::-webkit-scrollbar { display: none; }
html { scrollbar-width: none; }

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: var(--s-bg);
    color: var(--s-fg);
    font-family: var(--s-font-sans);
    transition: background-color 0.3s ease, color 0.3s ease;
}

body {
    display: grid;
    place-items: center;
}

/* Centered card — no overlapping decorations, no corner brackets, no scan
   lines. Everything in a single vertical stack with consistent spacing. */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 40px 32px;
    max-width: 440px;
    width: calc(100% - 32px);
    text-align: center;
}

/* Wordmark */
.brand {
    font-family: var(--s-font-mono);
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--s-fg-dim);
    user-select: none;
}

/* Multi-ring sonar pulse — the classic "back and forth" ring breathing,
   rebuilt with a soft aura, a hairline reference ring, and a steady core.
   Three rings of the same size phase-offset by 1/3 of the cycle, each
   easing between scale(0.55) and scale(1.0). Because their opacities also
   ride the curve, the eye reads it as rings emanating from the core
   without the harsh "ping then disappear" of a true sonar — they keep
   coming back, which gives the actual "back and forth" feel. */
.rings {
    position: relative;
    width: 132px;
    height: 132px;
    display: grid;
    place-items: center;
}
.rings::before {
    content: '';
    position: absolute;
    inset: -30%;
    background: radial-gradient(circle at center, var(--s-fg-faint), transparent 62%);
    pointer-events: none;
    animation: ringsAura 4s ease-in-out infinite;
    z-index: -1;
}
@keyframes ringsAura {
    0%, 100% { opacity: 0.32; transform: scale(0.92); }
    50%      { opacity: 0.85; transform: scale(1.08); }
}

/* Hairline reference ring — sits behind everything, never moves.
   Provides a "frame" that anchors the eye while the other rings breathe. */
.rings::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid var(--s-fg-faint);
    border-radius: 50%;
    pointer-events: none;
}

.ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--s-fg);
    box-shadow:
        0 0 16px rgba(255, 255, 255, 0.18),
        inset 0 0 12px rgba(255, 255, 255, 0.08);
    animation: ringBreathe 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    will-change: transform, opacity;
}
.ring-2 { animation-delay: -1s; border-style: dashed; }
.ring-3 { animation-delay: -2s; }

@keyframes ringBreathe {
    0%, 100% { transform: scale(0.5);  opacity: 0.15; }
    50%      { transform: scale(1.0);  opacity: 1; }
}

/* Steady core — small bright dot that never moves and pulses gently.
   Locks the composition; the rings appear to "breathe around" it. */
.ring-core {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--s-fg);
    box-shadow:
        0 0 6px var(--s-fg),
        0 0 18px rgba(255, 255, 255, 0.45);
    animation: ringCore 2s ease-in-out infinite;
}
@keyframes ringCore {
    0%, 100% { transform: scale(1);    opacity: 1; }
    50%      { transform: scale(0.55); opacity: 0.6; }
}

body.light-theme .ring {
    box-shadow:
        0 0 12px rgba(0, 0, 0, 0.10),
        inset 0 0 10px rgba(0, 0, 0, 0.05);
}
body.light-theme .ring-core {
    box-shadow:
        0 0 4px rgba(0, 0, 0, 0.5),
        0 0 14px rgba(0, 0, 0, 0.25);
}

/* Status text — what the page is doing right now */
.status {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}
.status-label {
    font-family: var(--s-font-mono);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--s-fg-dim);
}

h1 {
    margin: 0;
    font-family: var(--s-font-sans);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.4px;
    color: var(--s-fg);
    line-height: 1.55;
    transition: opacity 0.4s ease;
    max-width: 360px;
}

/* Thin indeterminate progress line */
.progress {
    width: 200px;
    height: 1px;
    background: var(--s-track);
    position: relative;
    overflow: hidden;
}
.progress::before {
    content: '';
    position: absolute;
    inset: 0 0 0 -40%;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--s-fg), transparent);
    animation: progressSlide 1.6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}
@keyframes progressSlide {
    to { transform: translateX(350%); }
}

/* h1 hidden/visible used by the timeout script */
.hidden { opacity: 0; }
.visible { opacity: 1; }

/* No-script fallback */
.noscript-container {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    z-index: 1000;
    padding: 24px;
    background: var(--s-bg);
}
.noscript-message {
    font-family: var(--s-font-mono);
    color: var(--s-fg);
    font-size: 13px;
    letter-spacing: 1.5px;
    text-align: center;
    border: 1px solid var(--s-border);
    border-radius: 8px;
    padding: 18px 24px;
    background: var(--s-track);
}

/* Responsive */
@media (max-width: 480px) {
    .container { gap: 22px; padding: 32px 24px; }
    .rings    { width: 108px; height: 108px; }
    h1        { font-size: 14px; }
    .progress { width: 160px; }
    .brand    { font-size: 10px; letter-spacing: 5px; }
}

@media (prefers-reduced-motion: reduce) {
    .rings::before,
    .ring,
    .ring-core,
    .progress::before {
        animation: none !important;
    }
    /* Park the rings at their midpoint so the composition still reads right. */
    .ring { transform: scale(0.78); opacity: 0.55; }
    .progress::before {
        inset: 0;
        width: 100%;
        opacity: 0.4;
    }
}
</style>
</head>
