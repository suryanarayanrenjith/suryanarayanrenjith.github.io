<script>
  (async function verifyAndProceed() {
    function getFingerprint() {
      return `${navigator.userAgent}-${screen.width}-${screen.height}-${navigator.language}-${window.devicePixelRatio}`;
    }

    const now = Date.now();
    const lastRefresh = localStorage.getItem('lastRefresh');
    let suspicious = false;

    if (lastRefresh && (now - parseInt(lastRefresh, 10) < 2000)) {
      suspicious = true;
    }
    localStorage.setItem('lastRefresh', now);

    try {
      const response = await fetch('https://surya-verify.vercel.app/api/verify-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fingerprint: getFingerprint(),
          suspicious: suspicious
        })
      });

      const data = await response.json();

      if (data.suspicious === true || !data.verified) {
        window.location.href = '/404';
        return;
      }

      console.log('User verified. Proceeding to the site...');
    } catch (error) {
      console.error('Error verifying user');
    }
  })();

(async function() {
    function block() {
      window.location.href = '/policy.html';
    }

    try {
      const res = await fetch('https://surya-verify.vercel.app/api/verify-proxy', {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
      });

      if (!res.ok) return block();

      const data = await res.json();
      if (typeof data !== 'boolean') return block();

      if (data) return block();

    } catch (err) {
      console.error('Proxy check error');
      block();
    }
  })();
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (!window.localStorage) {
        window.location.href = '/404';
        return;
    }

    if (!window.fetch) {
        window.location.href = '/404';
        return;
    }

    const bK = 'blockedUser';
    const vK = 'verifiedUser';
    const userAgent = navigator.userAgent;

    function isBotUA(uA) {
        return /curl|bot|spider|crawler|wget|Mediapartners-Google/i.test(uA);
    }

    function setBlocked() {
        localStorage.setItem(bK, 'true');
    }

    function clearBlocked() {
        localStorage.removeItem(bK);
    }

    function isBlocked() {
        return localStorage.getItem(bK) === "true";
    }

    function rateLimitCheck() {
        const attempts = JSON.parse(localStorage.getItem("attemptLog")) || [];
        const now = Date.now();
        const maxAttempts = 5;
        const timeWindow = 10000;

        const recent = attempts.filter(ts => now - ts < timeWindow);
        localStorage.setItem("attemptLog", JSON.stringify(recent));

        if (recent.length >= maxAttempts) {
            window.location.href = '/404';
            return true;
        }

        recent.push(now);
        localStorage.setItem("attemptLog", JSON.stringify(recent));
        return false;
    }

    async function redirectPath() {
        const path = window.location.pathname;
        const query = new URLSearchParams(window.location.search);
        const id = query.get('id');
        const gotoPath = '/Goto/';

        setTimeout(async () => {
            if (path.startsWith(gotoPath) && id) {
                try {
                    const response = await fetch(`https://surya-api.vercel.app/api/getLink?id=${encodeURIComponent(id)}`);
                    const data = await response.json();

                    if (data.link) {
                        window.location.href = data.link;
                    } else {
                        window.location.href = '/404';
                    }
                } catch (error) {
                    window.location.href = '/404';
                }
            } else {
                window.location.href = '/404';
            }
        }, 3000);
    }

    if (localStorage.getItem(vK)) {
        clearBlocked();
    } else {

        if (rateLimitCheck()) {
            return;
        }

        if (isBotUA(userAgent)) {
            setBlocked();
        }
    }

    if (isBlocked()) {
        window.location.href = '/404';
    } else {
        redirectPath();
    }
});
</script>
<style>
:root {
    --s-bg: #000;
    --s-fg: #fff;
    --s-fg-muted: rgba(255, 255, 255, 0.6);
    --s-fg-dim: rgba(255, 255, 255, 0.35);
    --s-fg-faint: rgba(255, 255, 255, 0.18);
    --s-border: rgba(255, 255, 255, 0.2);
    --s-border-subtle: rgba(255, 255, 255, 0.12);
    --s-surface: rgba(255, 255, 255, 0.05);
    --s-line: rgba(255, 255, 255, 0.25);
    --s-font-mono: 'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace;
}

body.light-theme {
    --s-bg: #f5f5f5;
    --s-fg: #111;
    --s-fg-muted: rgba(0, 0, 0, 0.55);
    --s-fg-dim: rgba(0, 0, 0, 0.3);
    --s-fg-faint: rgba(0, 0, 0, 0.15);
    --s-border: rgba(0, 0, 0, 0.15);
    --s-border-subtle: rgba(0, 0, 0, 0.08);
    --s-surface: rgba(0, 0, 0, 0.04);
    --s-line: rgba(0, 0, 0, 0.22);
}

::-webkit-scrollbar { display: none; }
html { scrollbar-width: none; }

*, *::before, *::after {
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: var(--s-bg);
    color: var(--s-fg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    transition: background-color 0.3s ease, color 0.3s ease;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Subtle grid background */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(var(--s-border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--s-border-subtle) 1px, transparent 1px);
    background-size: 64px 64px;
    background-position: -1px -1px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0.7;
    z-index: 0;
}

/* Vignette / scanline */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent 0,
        transparent 2px,
        rgba(255,255,255,0.008) 3px,
        transparent 4px
    );
    pointer-events: none;
    z-index: 1;
}
body.light-theme::after {
    background: repeating-linear-gradient(
        0deg,
        transparent 0,
        transparent 2px,
        rgba(0,0,0,0.012) 3px,
        transparent 4px
    );
}

/* Corner brackets */
.corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 2;
    pointer-events: none;
}
.corner::before,
.corner::after {
    content: '';
    position: absolute;
    background: var(--s-border);
}
.corner::before { width: 100%; height: 1px; }
.corner::after { width: 1px; height: 100%; }

.corner-tl { top: 32px; left: 32px; }
.corner-tl::before { top: 0; left: 0; }
.corner-tl::after { top: 0; left: 0; }

.corner-tr { top: 32px; right: 32px; }
.corner-tr::before { top: 0; right: 0; }
.corner-tr::after { top: 0; right: 0; }

.corner-bl { bottom: 32px; left: 32px; }
.corner-bl::before { bottom: 0; left: 0; }
.corner-bl::after { bottom: 0; left: 0; }

.corner-br { bottom: 32px; right: 32px; }
.corner-br::before { bottom: 0; right: 0; }
.corner-br::after { bottom: 0; right: 0; }

/* Top/bottom meta strips */
.meta-strip {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--s-font-mono);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--s-fg-dim);
    z-index: 3;
    white-space: nowrap;
    user-select: none;
}
.meta-strip-top { top: 36px; }
.meta-strip-bottom { bottom: 36px; }
.meta-strip .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--s-fg-muted);
    border-radius: 50%;
    margin: 0 10px;
    vertical-align: middle;
    animation: pulseDot 1.6s ease-in-out infinite;
}
@keyframes pulseDot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
}

/* Sweeping scan line across the viewport */
.scan-line {
    position: fixed;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--s-line), transparent);
    z-index: 2;
    pointer-events: none;
    animation: sweep 4.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
    opacity: 0.7;
}
@keyframes sweep {
    0%   { top: 8%;  opacity: 0; }
    8%   { opacity: 0.8; }
    50%  { opacity: 1; }
    92%  { opacity: 0.8; }
    100% { top: 92%; opacity: 0; }
}

/* Main container */
.container {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 24px;
    max-width: 720px;
}

/* Top fading rule */
.rule {
    width: 240px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--s-line), transparent);
    opacity: 0;
    animation: ruleIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
}
.rule-top { margin-bottom: 36px; }
.rule-bottom { margin-top: 36px; }
@keyframes ruleIn {
    from { width: 0; opacity: 0; }
    to   { width: 240px; opacity: 1; }
}

/* ====== Original rotating ring animation (preserved) ====== */
.animation-wrapper {
    position: relative;
    width: 170px;
    height: 170px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.web {
    position: absolute;
    width: 90%;
    height: 90%;
    border: 1px solid var(--s-fg);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--s-fg);
    animation: rotate 2s linear infinite, scale 4s ease-in-out infinite;
}
.web:nth-child(2) { animation-delay: -1s; }
.web:nth-child(3) { animation-delay: -2s; }

@keyframes rotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
@keyframes scale {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.5); }
}

/* Decorative orbiting elements that frame the rings */
.orbit-ring {
    position: absolute;
    border: 1px dashed var(--s-border-subtle);
    border-radius: 50%;
    pointer-events: none;
}
.orbit-ring.outer {
    width: 230px;
    height: 230px;
    animation: spinSlow 18s linear infinite;
}
.orbit-ring.inner {
    width: 130px;
    height: 130px;
    animation: spinSlow 12s linear reverse infinite;
}
@keyframes spinSlow {
    to { transform: rotate(360deg); }
}

.orbit-dot {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--s-fg);
    box-shadow: 0 0 8px var(--s-fg);
    top: 50%;
    left: 50%;
    transform-origin: 0 0;
}
.orbit-dot.d1 { animation: orbitA 5s linear infinite; }
.orbit-dot.d2 { animation: orbitB 7s linear infinite; }
.orbit-dot.d3 { animation: orbitC 9s linear infinite; }
@keyframes orbitA {
    from { transform: rotate(0deg) translateX(85px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(85px) rotate(-360deg); }
}
@keyframes orbitB {
    from { transform: rotate(120deg) translateX(115px) rotate(-120deg); }
    to   { transform: rotate(480deg) translateX(115px) rotate(-480deg); }
}
@keyframes orbitC {
    from { transform: rotate(240deg) translateX(70px) rotate(-240deg); }
    to   { transform: rotate(600deg) translateX(70px) rotate(-600deg); }
}

/* Crosshair tick marks around the rings */
.tick-mark {
    position: absolute;
    width: 1px;
    height: 8px;
    background: var(--s-fg-muted);
}
.tick-mark.t-top    { top: -16px;    left: 50%; transform: translateX(-50%); }
.tick-mark.t-right  { right: -16px;  top: 50%;  transform: translateY(-50%) rotate(90deg); }
.tick-mark.t-bottom { bottom: -16px; left: 50%; transform: translateX(-50%); }
.tick-mark.t-left   { left: -16px;   top: 50%;  transform: translateY(-50%) rotate(90deg); }

/* Status label above h1 */
.status-label {
    font-family: var(--s-font-mono);
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--s-fg-muted);
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    display: flex;
    align-items: center;
    gap: 10px;
}
.status-label::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--s-fg);
    box-shadow: 0 0 10px var(--s-fg);
    animation: statusBlink 1.4s ease-in-out infinite;
}
@keyframes statusBlink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.8); }
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* The h1 (preserved selector .container h1) */
h1 {
    margin: 0;
    font-family: var(--s-font-mono);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--s-fg-muted);
    max-width: 560px;
    line-height: 1.7;
    animation: fadeInOut 4s ease-in-out infinite;
    transition: opacity 0.6s ease;
}
@keyframes fadeInOut {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 1; }
}

/* Progress: dotted track + traveling segment */
.progress-track {
    margin-top: 28px;
    width: 220px;
    height: 1px;
    background: var(--s-border-subtle);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
}
.progress-track::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, transparent, var(--s-fg), transparent);
    animation: progressSlide 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}
@keyframes progressSlide {
    0%   { left: -30%; }
    100% { left: 100%; }
}

/* Coordinate ticks on the bottom */
.ticks {
    margin-top: 14px;
    display: flex;
    gap: 6px;
    opacity: 0;
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
}
.ticks span {
    width: 14px;
    height: 1px;
    background: var(--s-border);
}
.ticks span:nth-child(odd) { background: var(--s-border-subtle); }

/* h1 hidden / visible used by the inline timeout script */
.hidden { opacity: 0 !important; }
.visible { opacity: 1 !important; }

/* No-script fallback */
.noscript-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
}
.noscript-message {
    font-family: var(--s-font-mono);
    color: var(--s-fg);
    font-size: 14px;
    letter-spacing: 2px;
    text-align: center;
    border: 1px solid var(--s-border);
    padding: 20px 28px;
    background: var(--s-surface);
}

/* Responsive */
@media (max-width: 768px) {
    .corner { width: 28px; height: 28px; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; }

    .corner-br { bottom: 20px; right: 20px; }

        to   { transform: rotate(360deg) translateX(65px) rotate(-360deg); }
    }
    @keyframes orbitB {
        from { transform: rotate(120deg) translateX(90px) rotate(-120deg); }
        to   { transform: rotate(480deg) translateX(90px) rotate(-480deg); }
    }
    @keyframes orbitC {
        from { transform: rotate(240deg) translateX(55px) rotate(-240deg); }
        to   { transform: rotate(600deg) translateX(55px) rotate(-600deg); }
    }
    .rule { width: 180px; }
    @keyframes ruleIn { from { width: 0; opacity: 0; } to { width: 180px; opacity: 1; } }
    .rule-top { margin-bottom: 26px; }
    .rule-bottom { margin-top: 26px; }
    h1 { font-size: 13px; letter-spacing: 2px; }
    .progress-track { width: 180px; }
}

@media (max-width: 480px) {
    .meta-strip-top, .meta-strip-bottom { display: none; }
    .animation-wrapper { width: 100px; height: 100px; margin-bottom: 22px; }
    .orbit-ring.outer { width: 140px; height: 140px; }

    .progress-track { width: 150px; }
    .status-label { font-size: 9px; letter-spacing: 4px; }

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.001s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001s !important;
    }
}
</style>
