<body>
<script>
(function() {
    if (localStorage.getItem('suryaLightTheme') === 'true') {
        document.documentElement.classList.add('light-theme');
        document.body.classList.add('light-theme');
    }
})();
</script>
<script>
  (async function verifyAndProceed() {
    function getFingerprint() {
      return `${navigator.userAgent}-${screen.width}-${screen.height}-${navigator.language}-${window.devicePixelRatio}`;
    }
    
    const now = Date.now();
    const lastRefresh = localStorage.getItem('lastRefresh');
    let suspicious = false;
    
    if (lastRefresh && (now - parseInt(lastRefresh, 10) < 2000)) {
      suspicious = true;
    }
    localStorage.setItem('lastRefresh', now);
    
    try {
      const response = await fetch('https://surya-verify.vercel.app/api/verify-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fingerprint: getFingerprint(),
          suspicious: suspicious
        })
      });
      
      const data = await response.json();

      if (data.suspicious === true || !data.verified) {
        window.location.href = '/404';
        return;
      }
      
      console.log('User verified. Proceeding to the site...');
    } catch (error) {
      console.error('Error verifying user');
    }
  })();
        
(async function() {
    function block() {
      window.location.href = '/policy.html';
    }

    try {
      const res = await fetch('https://surya-verify.vercel.app/api/verify-proxy', {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
      });

      if (!res.ok) return block();

      const data = await res.json();
      if (typeof data !== 'boolean') return block();

      if (data) return block();

    } catch (err) {
      console.error('Proxy check error');
      block();
    }
  })(); 
</script>

    <div class="bg-layer bg-grid"></div>
    <div class="bg-layer bg-aurora"></div>
    <div class="bg-layer bg-ribbons"></div>
    <canvas id="particleCanvas" class="bg-layer"></canvas>
    <div class="bg-layer bg-noise"></div>
    <div class="bg-layer scanlines"></div>

    <div class="confetti-container" id="confetti"></div>

    <a href="../" class="back-link">
        <span class="back-arrow" aria-hidden="true">&larr;</span>
        <span>Back</span>
    </a>

    <div class="toast" id="toast" aria-live="polite"></div>

    <div class="main-container">
        <div class="contact-wrapper">
            <div class="robot-section">
                <div class="robot-shell">
                    <div class="robot-container">
                        <canvas id="godRayCanvas" aria-hidden="true"></canvas>
                        <div class="speech-bubble" id="speech" aria-live="polite"></div>
                        <canvas id="robotCanvas" aria-label="Interactive 3D robot assistant"></canvas>
                    </div>

                    <div class="robot-console">
                        <div class="robot-status" id="status" data-tone="active" aria-live="polite">Waiting for a signal</div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-header">
                    <h1>Get in Touch</h1>
                    <p>Have a question or want to collaborate? Drop me a message and I'll get back to you soon.</p>
                </div>

                <form id="contactForm" class="form-fields" novalidate>
                    <div class="field-row">
                        <div class="input-field" data-field="name">
                            <input type="text" id="name" name="name" placeholder=" " required autocomplete="name" maxlength="100">
                            <label for="name">Name</label>
                            <div class="input-line"></div>
                        </div>

                        <div class="input-field" data-field="email">
                            <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
                            <label for="email">Email</label>
                            <div class="input-line"></div>
                        </div>
                    </div>

                    <div class="input-field" data-field="subject">
                        <input type="text" id="subject" name="subject" placeholder=" " required autocomplete="off" maxlength="150">
                        <label for="subject">Subject</label>
                        <div class="input-line"></div>
                    </div>

                        <div class="input-field" data-field="message">
                            <textarea id="message" name="message" placeholder=" " required maxlength="500"></textarea>
                            <label for="message">Message</label>
                            <div class="input-line"></div>
                            <span class="char-counter" id="counter">0 / 500</span>
                        </div>

                        <div class="contact-honeypot" aria-hidden="true">
                            <label for="website">Website</label>
                            <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                        </div>

                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span class="btn-text">Send Message</span>
                        </button>
                </form>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
